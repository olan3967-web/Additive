<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Sign In</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-container { width: 100%; padding: 20px; position: relative; z-index: 1; }
        .login-card { background: rgba(20,25,50,0.85); backdrop-filter: blur(20px); border-radius: 32px; padding: 42px 40px; max-width: 450px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5); }
        .logo { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 8px; color: #fff; }
        .logo span { color: #8ca3ff; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 36px; font-size: 14px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-size: 13px; }
        .form-group label i { margin-right: 8px; color: #8ca3ff; }
        .form-group input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #2a3560; border-radius: 14px; padding: 14px 18px; color: white; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #8ca3ff; box-shadow: 0 0 0 3px rgba(140,163,255,0.15); }
        .login-btn { width: 100%; background: linear-gradient(135deg, #2f3e7a, #1f2a50); border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 28px; transition: 0.2s; }
        .login-btn:hover { transform: scale(1.02); background: linear-gradient(135deg, #3e5090, #2a3768); }
        .register-link { text-align: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: #aaa; }
        .register-link a { color: #8ca3ff; text-decoration: none; }
        .error-message { text-align: center; margin-top: 18px; font-size: 13px; min-height: 40px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">ADDITIVE<span>®</span></div>
            <div class="subtitle">Sign in to your account</div>
            <div class="form-group"><label><i class="fas fa-user"></i> Username</label><input type="text" id="loginUsername" placeholder="Enter your username"></div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="loginPassword" placeholder="Enter your password"></div>
            <button class="login-btn" onclick="handleSignIn()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            <div id="loginError" class="error-message"></div>
            <div class="register-link">Don't have an account? <a href="register.html">Register now <i class="fas fa-arrow-right"></i></a></div>
        </div>
    </div>
    <script>
        function handleSignIn() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            if (!username || !password) { errorDiv.innerText = 'Please enter username and password'; errorDiv.style.color = '#ff8080'; return; }
            const members = JSON.parse(localStorage.getItem('additive_members') || '[]');
            const user = members.find(m => m.username === username && m.password === password);
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({ uid: user.uid, username: user.username, balance: user.balance || 0, commissionRate: user.commissionRate || 5, vipLevel: user.vipLevel || 1, inviteCode: user.inviteCode, pin: user.pin, isLoggedIn: true, loginTime: Date.now() }));
                errorDiv.innerText = 'Login successful! Redirecting...'; errorDiv.style.color = '#4ade80';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else { errorDiv.innerText = 'Invalid username or password'; errorDiv.style.color = '#ff8080'; }
        }
        if (localStorage.getItem('currentUser')) { try { if (JSON.parse(localStorage.getItem('currentUser')).isLoggedIn) window.location.href = 'dashboard.html'; } catch(e){} }
        document.addEventListener('keypress', e => { if (e.key === 'Enter') handleSignIn(); });
    </script>
</body>
</html>
