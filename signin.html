<!DOCTYPE html>
<html>
<head>
    <title>ADDITIVE Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0f2a, #0f0a2a);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: rgba(20,30,55,0.95);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            border: 1px solid #8ca3ff;
        }
        h1 { color: #8ca3ff; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1f3a;
            border: 1px solid #2a2e4a;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #8ca3ff;
            border: none;
            border-radius: 8px;
            color: #0a0f2a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { opacity: 0.9; }
        .error { color: #ff8888; margin-top: 10px; font-size: 12px; }
        .success { color: #4ade80; margin-top: 10px; font-size: 12px; }
        .register-link { margin-top: 20px; color: #aaa; }
        .register-link a { color: #8ca3ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ADDITIVE</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="doLogin()">Sign In</button>
        <div id="message"></div>
        <div class="register-link"><a href="register.html">Create Account</a></div>
    </div>

    <script>
        const SB_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
        const SB_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            
            if (!username || !password) {
                msgDiv.innerHTML = '<span class="error">Please enter username and password</span>';
                return;
            }
            
            msgDiv.innerHTML = '<span style="color:#C9B095;">Logging in...</span>';
            
            try {
                // 查询用户
                const { data, error } = await sb
                    .from('users')
                    .select('uid, username, balance, vip_level')
                    .eq('username', username)
                    .eq('password', password);
                
                console.log('Query result:', data, error);
                
                if (error) {
                    msgDiv.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
                    return;
                }
                
                if (!data || data.length === 0) {
                    msgDiv.innerHTML = '<span class="error">Invalid username or password</span>';
                    return;
                }
                
                const user = data[0];
                
                // 保存登录状态
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    username: user.username,
                    balance: user.balance || 0,
                    isLoggedIn: true,
                    loginTime: Date.now()
                }));
                
                msgDiv.innerHTML = '<span class="success">Login successful! Redirecting...</span>';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch(err) {
                msgDiv.innerHTML = '<span class="error">Error: ' + err.message + '</span>';
            }
        }
        
        // 按回车登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
        
        // 检查是否已登录
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user.isLoggedIn) {
                    window.location.href = 'dashboard.html';
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
