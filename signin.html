<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #050814);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container { width: 100%; padding: 20px; }
        .register-card {
            background: rgba(20, 30, 55, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 42px 40px;
            max-width: 480px;
            margin: 0 auto;
            border: 1px solid rgba(201, 176, 149, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .logo { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 8px; color: #ffffff; }
        .logo span { color: #C9B095; }
        .subtitle { text-align: center; color: #a0a8c0; margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #a0a8c0; font-size: 13px; }
        .form-group label i { margin-right: 8px; color: #C9B095; }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #C9B095; box-shadow: 0 0 0 3px rgba(201,176,149,0.15); }
        .register-btn {
            width: 100%;
            background: linear-gradient(135deg, #C9B095, #b8944a);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: #0A122B;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            transition: 0.2s;
        }
        .register-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .login-link { text-align: center; margin-top: 24px; font-size: 13px; color: #a0a8c0; }
        .login-link a { color: #C9B095; text-decoration: none; }
        .error-message { text-align: center; margin-top: 16px; font-size: 13px; min-height: 40px; }
        .success-message { text-align: center; margin-top: 16px; font-size: 13px; color: #4ade80; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">ADDITIVE<span>®</span></div>
            <div class="subtitle">Create your account</div>
            <div class="form-group"><label><i class="fas fa-user"></i> Username</label><input type="text" id="regUsername" placeholder="Username (min 3 chars)"></div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="regPassword" placeholder="Password (min 4 chars)"></div>
            <div class="form-group"><label><i class="fas fa-qrcode"></i> Invitation Code (optional)</label><input type="text" id="regInviteCode" placeholder="Enter invite code"></div>
            <div class="form-group"><label><i class="fas fa-wallet"></i> Withdrawal PIN (4 digits)</label><input type="password" id="regPin" maxlength="4" placeholder="4-digit PIN"></div>
            <button class="register-btn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div class="login-link">Already have an account? <a href="signin.html">Sign in</a></div>
            <div id="registerError" class="error-message"></div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            function generateInviteCode(username) {
                const base = username.toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 6);
                if (base.length < 3) return 'USER' + Math.floor(Math.random() * 10000);
                return base + Math.floor(Math.random() * 1000);
            }
            
            function showMessage(msg, isError = true) {
                const d = document.getElementById('registerError');
                d.innerText = msg;
                d.style.color = isError ? '#ff8080' : '#4ade80';
                setTimeout(() => { if (d.innerText === msg) d.innerText = ''; }, 3000);
            }
            
            window.handleRegister = async function() {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const inviteCode = document.getElementById('regInviteCode').value.trim();
                const pin = document.getElementById('regPin').value;
                
                if (!username || username.length < 3) { showMessage('Username must be at least 3 characters'); return; }
                if (!password || password.length < 4) { showMessage('Password must be at least 4 characters'); return; }
                if (!pin || pin.length !== 4 || isNaN(pin)) { showMessage('Withdrawal PIN must be 4 digits'); return; }
                
                // 检查用户名是否已存在
                const { data: existing } = await _supabase
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .single();
                
                if (existing) { showMessage('Username already exists'); return; }
                
                // 获取最大 UID
                const { data: maxUidData } = await _supabase
                    .from('users')
                    .select('uid')
                    .order('uid', { ascending: false })
                    .limit(1);
                
                let newUid = '100001';
                if (maxUidData && maxUidData.length > 0) {
                    newUid = (parseInt(maxUidData[0].uid) + 1).toString();
                }
                
                // 处理邀请码
                let invitedBy = '';
                let invitedByUsername = '';
                if (inviteCode) {
                    const { data: inviter } = await _supabase
                        .from('users')
                        .select('uid, username')
                        .eq('invite_code', inviteCode)
                        .single();
                    
                    if (inviter) {
                        invitedBy = inviter.uid;
                        invitedByUsername = inviter.username;
                        // 给邀请人奖励 €10
                        const { data: inviterData } = await _supabase
                            .from('users')
                            .select('balance')
                            .eq('uid', inviter.uid)
                            .single();
                        
                        const newBalance = (inviterData?.balance || 0) + 10;
                        await _supabase
                            .from('users')
                            .update({ balance: newBalance })
                            .eq('uid', inviter.uid);
                        
                        await _supabase
                            .from('deposits')
                            .insert([{ uid: inviter.uid, username: inviter.username, amount: 10, type: 'referral_bonus' }]);
                        
                        showMessage('Invitation code accepted!', false);
                    } else {
                        showMessage('Invitation code not found', false);
                    }
                }
                
                // 生成邀请码
                const newInviteCode = generateInviteCode(username);
                
                // 创建新用户
                const { data: newUser, error } = await _supabase
                    .from('users')
                    .insert([{
                        uid: newUid,
                        username: username,
                        password: password,
                        pin: pin,
                        balance: 0,
                        trial_bonus_amount: 0,
                        vip_level: 1,
                        invite_code: newInviteCode,
                        invited_by: invitedBy,
                        invited_by_username: invitedByUsername,
                        total_orders: 0,
                        is_active: true
                    }])
                    .select()
                    .single();
                
                if (error) {
                    showMessage('Registration failed: ' + error.message);
                    return;
                }
                
                // 保存登录状态
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: newUid,
                    username: username,
                    balance: 0,
                    trialBonusAmount: 0,
                    commissionRate: 5,
                    vipLevel: 1,
                    inviteCode: newInviteCode,
                    isLoggedIn: true,
                    loginTime: Date.now()
                }));
                
                showMessage('Registration successful! Redirecting...', false);
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            };
        })();
        
        // 检查是否已登录
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user.isLoggedIn) window.location.href = 'dashboard.html';
            } catch(e) {}
        }
    </script>
</body>
</html>
