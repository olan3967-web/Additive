<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #050814);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container { width: 100%; padding: 20px; }
        .login-card {
            background: rgba(20, 30, 55, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid rgba(201, 176, 149, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .logo { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 8px; color: #ffffff; }
        .logo span { color: #C9B095; }
        .subtitle { text-align: center; color: #a0a8c0; margin-bottom: 36px; font-size: 14px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; color: #a0a8c0; font-size: 13px; }
        .form-group label i { margin-right: 8px; color: #C9B095; }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #C9B095; box-shadow: 0 0 0 3px rgba(201,176,149,0.15); }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #C9B095, #b8944a);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: #0A122B;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            transition: 0.2s;
        }
        .login-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .register-link { text-align: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid rgba(201,176,149,0.15); font-size: 13px; color: #a0a8c0; }
        .register-link a { color: #C9B095; text-decoration: none; }
        .error-message { text-align: center; margin-top: 18px; font-size: 13px; min-height: 40px; }
        .success-message { text-align: center; margin-top: 18px; font-size: 13px; color: #4ade80; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">ADDITIVE<span>®</span></div>
            <div class="subtitle">Sign in to your account</div>
            <div class="form-group"><label><i class="fas fa-user"></i> Username</label><input type="text" id="loginUsername" placeholder="Enter your username"></div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="loginPassword" placeholder="Enter your password"></div>
            <button class="login-btn" onclick="handleSignIn()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            <div id="loginError" class="error-message"></div>
            <div class="register-link">Don't have an account? <a href="register.html">Register now <i class="fas fa-arrow-right"></i></a></div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleSignIn() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.innerText = 'Please enter username and password';
                errorDiv.style.color = '#ff8080';
                return;
            }
            
            errorDiv.innerText = 'Checking credentials...';
            errorDiv.style.color = '#C9B095';
            
            try {
                // 从 Supabase 查询用户
                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();
                
                if (error || !user) {
                    errorDiv.innerText = 'Invalid username or password';
                    errorDiv.style.color = '#ff8080';
                    return;
                }
                
                // 保存登录状态
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    username: user.username,
                    balance: user.balance || 0,
                    trialBonusAmount: user.trial_bonus_amount || 0,
                    commissionRate: user.commission_rate || 5,
                    vipLevel: user.vip_level || 1,
                    inviteCode: user.invite_code,
                    pin: user.pin,
                    isLoggedIn: true,
                    loginTime: Date.now()
                }));
                
                errorDiv.innerText = 'Login successful! Redirecting...';
                errorDiv.style.color = '#4ade80';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } catch(err) {
                errorDiv.innerText = 'Login error: ' + err.message;
                errorDiv.style.color = '#ff8080';
            }
        }
        
        // 检查是否已登录
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user.isLoggedIn && user.loginTime && (Date.now() - user.loginTime < 86400000)) {
                    window.location.href = 'dashboard.html';
                }
            } catch(e) {}
        }
        
        document.addEventListener('keypress', e => { if (e.key === 'Enter') handleSignIn(); });
    </script>
</body>
</html>
