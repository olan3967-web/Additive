<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANTAP ADMIN | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-common.css">
    <style>
        /* 确保琥珀色通知样式存在 */
        @keyframes slideIn {
            0% { transform: translateX(calc(100% + 20px)); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(calc(100% + 20px)); opacity: 0; }
        }
        @keyframes toastProgress {
            0% { width: 100%; }
            100% { width: 0%; }
        }
        
        /* Email Verification 表格样式 */
        .email-request-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .email-request-item .email-info {
            flex: 2;
        }
        .email-request-item .email-address {
            font-size: 14px;
            font-weight: 600;
            color: #ffb84d;
        }
        .email-request-item .request-time {
            font-size: 11px;
            color: #8a9abb;
            margin-top: 4px;
        }
        .email-request-item .code-input {
            width: 120px;
            background: #1e2a3a;
            border: 1px solid #4a7cff;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .email-request-item .set-code-btn {
            background: #2f6b3a;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .email-request-item .set-code-btn:hover {
            background: #3a8a4a;
        }
        .email-request-item .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .status-pending { background: rgba(255,184,77,0.15); color: #ffb84d; }
        .status-verified { background: rgba(46,209,90,0.15); color: #2ed15a; }

        /* 快速卡片样式 */
        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .quick-card {
            background: linear-gradient(135deg, rgba(74,124,255,0.1), rgba(74,124,255,0.02));
            border: 1px solid rgba(74,124,255,0.2);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .quick-card:hover {
            transform: translateY(-3px);
            border-color: #4a7cff;
            background: rgba(74,124,255,0.15);
        }

        .quick-card i {
            font-size: 28px;
            color: #4a7cff;
            margin-bottom: 12px;
            display: block;
        }

        .quick-card .count {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
            color: #ffdd99;
        }

        .quick-card .label {
            font-size: 13px;
            color: #8a9abb;
        }

        /* ========== 强制覆盖 user-common.css 对后台的影响 ========== */
        body {
            background: #030712 !important;
            font-family: 'Inter', sans-serif;
            color: #eef5ff;
        }

        .app {
            display: flex !important;
            min-height: 100vh !important;
            background: #030712 !important;
        }

        .sidebar {
            width: 280px !important;
            background: #0a0f1a !important;
            border-right: 1px solid #1a2a3a !important;
            position: fixed !important;
            height: 100vh !important;
            left: 0 !important;
            top: 0 !important;
            transform: none !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .main {
            flex: 1 !important;
            margin-left: 280px !important;
            padding: 28px 36px !important;
            background: #030712 !important;
            width: calc(100% - 280px) !important;
        }

        /* 修复菜单栏位置 */
        .nav-item {
            position: relative !important;
            transform: none !important;
        }

        /* 隐藏手机版菜单按钮 */
        .menu-toggle {
            display: none !important;
        }

        /* 修复卡片背景 */
        .card {
            background: rgba(15, 25, 40, 0.9) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(74, 124, 255, 0.15) !important;
            border-radius: 24px !important;
        }
    </style>
</head>
<body>

<div class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="logo">MANTAP<span style="color:#4a7cff;">ADMIN</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i> <span data-i18n="menu_dashboard">Admin Dashboard</span></div>
        <div class="nav-item" data-page="users"><i class="fas fa-users"></i> <span data-i18n="menu_users">User Management</span></div>
        <div class="nav-item" data-page="kyc"><i class="fas fa-id-card"></i> <span data-i18n="menu_kyc">KYC Verification</span></div>
        <div class="nav-item" data-page="emailverify"><i class="fas fa-envelope"></i> <span data-i18n="menu_emailverify">Email Verification</span></div>
        <div class="nav-item" data-page="trial"><i class="fas fa-gift"></i> <span data-i18n="menu_trial">Trial Bonus</span></div>
        <div class="nav-item" data-page="withdrawals"><i class="fas fa-money-bill-wave"></i> <span data-i18n="menu_withdrawals">Withdrawal</span></div>
        <div class="nav-item" data-page="vip"><i class="fas fa-crown"></i> <span data-i18n="menu_vip">VIP Settings</span></div>
        <div class="nav-item" data-page="setorders"><i class="fas fa-cog"></i> <span data-i18n="menu_setorders">Orders Trigger</span></div>
        <div class="nav-item" data-page="orders"><i class="fas fa-clock"></i> <span data-i18n="menu_orders">Orders History</span></div>
        <div class="nav-item" data-page="orderpool"><i class="fas fa-hotel"></i> <span data-i18n="menu_orderpool">Orders Pool</span></div>
        <div class="nav-item" data-page="animated"><i class="fas fa-play-circle"></i> <span data-i18n="menu_animated">Animated</span></div>
        <div class="nav-item" data-page="signin"><i class="fas fa-calendar-check"></i> <span data-i18n="menu_signin">Check In Bonus</span></div>
        <div class="nav-item" data-page="certificate"><i class="fas fa-certificate"></i> <span data-i18n="menu_certificate">Certificate</span></div>
        <div class="nav-item" data-page="content"><i class="fas fa-file-alt"></i> <span data-i18n="menu_content">Content</span></div>
        <div style="margin-top: 40px;"><button id="logoutBtn" style="width:100%; background:#7a2020;"><i class="fas fa-sign-out-alt"></i> <span data-i18n="menu_logout">Log Out</span></button></div>
    </div>

    <div class="main">
        <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 24px;">
            <div class="top-bar-right">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center cursor-pointer">
                    <i class="fas fa-user text-white text-sm"></i>
                </div>
            </div>
        </div>

        <!-- 页面容器 -->
        <div id="page_dashboard" class="page active"></div>
        <div id="page_users" class="page"></div>
        <div id="page_kyc" class="page"></div>
        <div id="page_emailverify" class="page"></div>
        <div id="page_trial" class="page"></div>
        <div id="page_withdrawals" class="page"></div>
        <div id="page_vip" class="page"></div>
        <div id="page_setorders" class="page"></div>
        <div id="page_orders" class="page"></div>
        <div id="page_orderpool" class="page"></div>
        <div id="page_animated" class="page"></div>
        <div id="page_signin" class="page"></div>
        <div id="page_certificate" class="page"></div>
        <div id="page_content" class="page"></div>
    </div>
</div>

<!-- 共用 Modal -->
<div id="addUserModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-user-plus"></i> <span data-i18n="create_user_title">Create New User</span></h3>
        <input type="text" id="newPhone" data-i18n-placeholder="phone_placeholder" placeholder="Phone Number" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="newUsername" data-i18n-placeholder="username_placeholder" placeholder="Username" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="password" id="newPassword" data-i18n-placeholder="password_placeholder" placeholder="Password" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <div style="display: flex; gap: 12px; margin-top: 20px;"><button id="createUserBtn" class="success"><span data-i18n="btn_create">Create</span></button><button id="closeUserModalBtn"><span data-i18n="btn_cancel">Cancel</span></button></div>
    </div>
</div>

<div id="orderModal" class="modal-overlay">
    <div class="modal-card">
        <h3 id="orderModalTitle"><span data-i18n="add_order_title">Add Order</span></h3>
        <input type="text" id="orderCode" data-i18n-placeholder="order_no_placeholder" placeholder="Order No" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="hotelName" data-i18n-placeholder="hotel_name_placeholder" placeholder="Hotel Name" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="number" id="price" data-i18n-placeholder="price_placeholder" placeholder="Price (€)" step="0.01" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="imageUrl" data-i18n-placeholder="image_url_placeholder" placeholder="Image URL" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <select id="status" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
            <option value="available" data-i18n="status_available">available</option>
            <option value="unavailable" data-i18n="status_unavailable">unavailable</option>
        </select>
        <input type="hidden" id="editId" value="">
        <div style="display: flex; gap: 12px; margin-top: 20px;"><button id="saveOrderBtn" class="success"><span data-i18n="btn_save">Save</span></button><button id="cancelOrderBtn"><span data-i18n="btn_cancel">Cancel</span></button></div>
    </div>
</div>

<script src="admin-lang.js"></script>
<script src="admin-common.js"></script>
<script src="admin-dashboard.js"></script>
<script src="admin-users.js"></script>
<script src="admin-kyc.js"></script>
<script src="admin-emailverify.js"></script>
<script src="admin-trial.js"></script>
<script src="admin-withdrawals.js"></script>
<script src="admin-vip.js"></script>
<script src="admin-setorders.js"></script>
<script src="admin-orders.js"></script>
<script src="admin-orderpool.js"></script>
<script src="admin-animated.js"></script>
<script src="admin-signin.js"></script>
<script src="admin-certificate.js"></script>
<script src="admin-content.js"></script>

<script>
    // 导航点击事件
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => showPage(item.getAttribute('data-page')));
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => { 
        localStorage.removeItem('admin_logged_in'); 
        window.location.href = 'admin-login.html'; 
    });
    
    // 加载默认页面
    showPage('dashboard');
    
    // 初始化语言系统
    if (window.adminLang) {
        window.adminLang.init();
    }
    
    // 处理 data-i18n-placeholder 属性
    function updatePlaceholders() {
        if (!window.adminLang) return;
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            const translation = window.adminLang.t(key);
            if (translation !== key) {
                el.placeholder = translation;
            }
        });
    }
    
    if (window.adminLang) {
        updatePlaceholders();
        window.addEventListener('adminLanguageChanged', updatePlaceholders);
    }
</script>
</body>
</html>
