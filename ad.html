<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA ADMIN | 极光黑智能后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-common.css">
    <style>
        /* 确保琥珀色通知样式存在 */
        @keyframes slideIn {
            0% { transform: translateX(calc(100% + 20px)); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(calc(100% + 20px)); opacity: 0; }
        }
        @keyframes toastProgress {
            0% { width: 100%; }
            100% { width: 0%; }
        }
        
        /* Email Verification 表格样式 */
        .email-request-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .email-request-item .email-info {
            flex: 2;
        }
        .email-request-item .email-address {
            font-size: 14px;
            font-weight: 600;
            color: #ffb84d;
        }
        .email-request-item .request-time {
            font-size: 11px;
            color: #8a9abb;
            margin-top: 4px;
        }
        .email-request-item .code-input {
            width: 120px;
            background: #1e2a3a;
            border: 1px solid #4a7cff;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .email-request-item .set-code-btn {
            background: #2f6b3a;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .email-request-item .set-code-btn:hover {
            background: #3a8a4a;
        }
        .email-request-item .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .status-pending { background: rgba(255,184,77,0.15); color: #ffb84d; }
        .status-verified { background: rgba(46,209,90,0.15); color: #2ed15a; }

/* 快速卡片样式 */
.quick-actions-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 28px;
}

.quick-card {
    background: linear-gradient(135deg, rgba(74,124,255,0.1), rgba(74,124,255,0.02));
    border: 1px solid rgba(74,124,255,0.2);
    border-radius: 20px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
}

.quick-card:hover {
    transform: translateY(-3px);
    border-color: #4a7cff;
    background: rgba(74,124,255,0.15);
}

.quick-card i {
    font-size: 28px;
    color: #4a7cff;
    margin-bottom: 12px;
    display: block;
}

.quick-card .count {
    font-size: 28px;
    font-weight: 700;
    margin: 8px 0;
    color: #ffdd99;
}

.quick-card .label {
    font-size: 13px;
    color: #8a9abb;
}

/* 琥珀色通知动画 */
@keyframes slideIn {
    0% { transform: translateX(calc(100% + 20px)); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
}

@keyframes slideOut {
    0% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(calc(100% + 20px)); opacity: 0; }
}

@keyframes toastProgress {
    0% { width: 100%; }
    100% { width: 0%; }
}

/* ========== 强制覆盖 user-common.css 对后台的影响 ========== */
body {
    background: #030712 !important;
    font-family: 'Inter', sans-serif;
    color: #eef5ff;
}

.app {
    display: flex !important;
    min-height: 100vh !important;
    background: #030712 !important;
}

.sidebar {
    width: 280px !important;
    background: #0a0f1a !important;
    border-right: 1px solid #1a2a3a !important;
    position: fixed !important;
    height: 100vh !important;
    left: 0 !important;
    top: 0 !important;
    transform: none !important;
    visibility: visible !important;
    opacity: 1 !important;
}

.main {
    flex: 1 !important;
    margin-left: 280px !important;
    padding: 28px 36px !important;
    background: #030712 !important;
    width: calc(100% - 280px) !important;
}

/* 修复菜单栏位置 */
.nav-item {
    position: relative !important;
    transform: none !important;
}

/* 隐藏手机版菜单按钮 */
.menu-toggle {
    display: none !important;
}

/* 修复卡片背景 */
.card {
    background: rgba(15, 25, 40, 0.9) !important;
    backdrop-filter: blur(12px) !important;
    border: 1px solid rgba(74, 124, 255, 0.15) !important;
    border-radius: 24px !important;
}
    </style>
</head>
<body>

<div class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="logo">AURORA<span style="color:#4a7cff;">ADMIN</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i> 仪表板</div>
        <div class="nav-item" data-page="users"><i class="fas fa-users"></i> 用户管理</div>
        <div class="nav-item" data-page="kyc"><i class="fas fa-id-card"></i> KYC Verification</div>
        <div class="nav-item" data-page="emailverify"><i class="fas fa-envelope"></i> Email Verification</div>
        <div class="nav-item" data-page="trial"><i class="fas fa-gift"></i> 体验金管理</div>
        <div class="nav-item" data-page="withdrawals"><i class="fas fa-money-bill-wave"></i> Withdraw审核</div>
        <div class="nav-item" data-page="vip"><i class="fas fa-crown"></i> VIP 配置</div>
        <div class="nav-item" data-page="setorders"><i class="fas fa-cog"></i> 设置订单</div>
        <div class="nav-item" data-page="orders"><i class="fas fa-clock"></i> 订单记录</div>
        <div class="nav-item" data-page="orderpool"><i class="fas fa-hotel"></i> 订单池</div>
        <div class="nav-item" data-page="animated"><i class="fas fa-play-circle"></i> 动画/视频</div>
        <div class="nav-item" data-page="signin"><i class="fas fa-calendar-check"></i> 签到奖励</div>
<div class="nav-item" data-page="certificate"><i class="fas fa-certificate"></i> Certificate</div>
        <div class="nav-item" data-page="content"><i class="fas fa-file-alt"></i> 内容管理</div>
        <div style="margin-top: 40px;"><button id="logoutBtn" style="width:100%; background:#7a2020;"><i class="fas fa-sign-out-alt"></i> 退出登录</button></div>
    </div>

    <div class="main">
        <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 24px;">
            <div class="top-bar-right">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center cursor-pointer">
                    <i class="fas fa-user text-white text-sm"></i>
                </div>
            </div>
        </div>

        <!-- 页面容器 -->
        <div id="page_dashboard" class="page active"></div>
        <div id="page_users" class="page"></div>
        <div id="page_kyc" class="page"></div>
        <div id="page_emailverify" class="page"></div>
        <div id="page_trial" class="page"></div>
        <div id="page_withdrawals" class="page"></div>
        <div id="page_vip" class="page"></div>
        <div id="page_setorders" class="page"></div>
        <div id="page_orders" class="page"></div>
        <div id="page_orderpool" class="page"></div>
        <div id="page_animated" class="page"></div>
        <div id="page_signin" class="page"></div>
<div id="page_certificate" class="page"></div>
        <div id="page_content" class="page"></div>
    </div>
</div>

<!-- 共用 Modal -->
<div id="addUserModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-user-plus"></i> 创建新用户</h3>
        <input type="text" id="newPhone" placeholder="手机号" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="newUsername" placeholder="用户名" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="password" id="newPassword" placeholder="密码" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <div style="display: flex; gap: 12px; margin-top: 20px;"><button id="createUserBtn" class="success">创建</button><button id="closeUserModalBtn">Cancel</button></div>
    </div>
</div>

<div id="orderModal" class="modal-overlay">
    <div class="modal-card">
        <h3 id="orderModalTitle">Add订单</h3>
        <input type="text" id="orderCode" placeholder="Order No" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="hotelName" placeholder="酒店名称" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="number" id="price" placeholder="价格 (€)" step="0.01" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="imageUrl" placeholder="图片 URL" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <select id="status" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
            <option value="available">available</option>
            <option value="unavailable">unavailable</option>
        </select>
        <input type="hidden" id="editId" value="">
        <div style="display: flex; gap: 12px; margin-top: 20px;"><button id="saveOrderBtn" class="success">Save</button><button id="cancelOrderBtn">Cancel</button></div>
    </div>
</div>

<script src="admin-common.js"></script>
<script src="admin-dashboard.js"></script>
<script src="admin-users.js"></script>
<script src="admin-kyc.js"></script>
<script src="admin-emailverify.js"></script>
<script src="admin-trial.js"></script>
<script src="admin-withdrawals.js"></script>
<script src="admin-vip.js"></script>
<script src="admin-setorders.js"></script>
<script src="admin-orders.js"></script>
<script src="admin-orderpool.js"></script>
<script src="admin-animated.js"></script>
<script src="admin-signin.js"></script>
<script src="admin-certificate.js"></script>
<script src="admin-content.js"></script>

<script>
    // 导航点击事件
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => showPage(item.getAttribute('data-page')));
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => { 
        localStorage.removeItem('admin_logged_in'); 
        window.location.href = 'admin-login.html'; 
    });
    
    // 加载默认页面
    showPage('dashboard');
</script>
</body>
</html>
