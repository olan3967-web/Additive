<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            display: flex;
            justify-content: center;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding-bottom: 80px;
            position: relative;
        }

        .page-header {
            padding: 20px 20px 10px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 13px;
            color: #6b7280;
        }

        /* 聊天卡片 */
        .chat-card {
            background: white;
            border-radius: 24px;
            margin: 16px 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid #eef2f7;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .chat-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fff7ed, #ffe7cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .chat-icon i {
            font-size: 40px;
            color: #ff7a00;
        }

        .chat-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .chat-subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .chat-btn {
            width: 100%;
            background: #ff7a00;
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .chat-btn:hover {
            background: #ea580c;
            transform: scale(1.01);
        }

        /* 联系信息 */
        .contact-info {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
            text-align: left;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }

        .contact-item i {
            width: 32px;
            color: #ff7a00;
            font-size: 18px;
        }

        .contact-item .label {
            font-size: 11px;
            color: #94a3b8;
        }

        .contact-item .value {
            font-size: 13px;
            font-weight: 500;
            color: #1f2937;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            cursor: pointer;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="phone">

    <div class="page-header">
        <h1>Chat</h1>
        <p>Connect with our support team</p>
    </div>

    <div class="chat-card">
        <div class="chat-icon">
            <i class="fas fa-headset"></i>
        </div>
        <div class="chat-title">Need Help?</div>
        <div class="chat-subtitle">Our support team is here to assist you</div>

        <button class="chat-btn" onclick="openLiveChat()">
            <i class="fas fa-comment-dots"></i> Start Live Chat
        </button>

        <div class="contact-info">
            <div class="contact-item">
                <i class="fas fa-envelope"></i>
                <div>
                    <div class="label">Email</div>
                    <div class="value">support@additive.com</div>
                </div>
            </div>
            <div class="contact-item">
                <i class="fab fa-telegram"></i>
                <div>
                    <div class="label">Telegram</div>
                    <div class="value">@additive_support</div>
                </div>
            </div>
            <div class="contact-item">
                <i class="fas fa-clock"></i>
                <div>
                    <div class="label">Service Hours</div>
                    <div class="value">10:00 AM - 10:00 PM (UTC+8)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item active" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>

</div>

<script>
    function openLiveChat() {
        showToast('Live chat support coming soon. Please contact us via email or Telegram.', 'info');
    }

    function setupBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page === 'dashboard') window.location.href = 'start.html';
                else if (page === 'products') window.location.href = 'products.html';
                else if (page === 'orders') window.location.href = 'orders-history.html';
                else if (page === 'profile') window.location.href = 'dashboard.html';
            });
        });
    }

    setupBottomNav();
</script>
</body>
</html>
