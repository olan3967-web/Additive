<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDITIVE - Withdrawal</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0b0f1c; color:white; font-family: 'Inter', sans-serif; }
        .app { display: flex; }
        .sidebar { width:260px; background:#0f1322; padding:32px 20px; }
        .nav-item { display:block; padding:10px 16px; color:#a3aed4; text-decoration:none; }
        .active { background:#1e2a4e; border-radius:12px; color:white; }
        .main { flex:1; padding:32px 40px; }
        .card { background:#101624; border-radius:32px; padding:24px; margin-bottom:24px; }
        .amount-options { display:flex; gap:16px; margin:20px 0; }
        .amount-btn { background:#1e2a46; padding:12px 24px; border-radius:40px; cursor:pointer; }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo">ADDITIVE</div>
        <div class="nav">
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="start.html" class="nav-item">Start</a>
            <a href="history.html" class="nav-item">History</a>
            <a href="signin.html" class="nav-item">Sign in</a>
            <a href="withdrawal.html" class="nav-item active">Withdrawal</a>
            <a href="chat.html" class="nav-item">Chat with us</a>
            <a href="settings.html" class="nav-item">Settings</a>
        </div>
    </aside>
    <main class="main">
        <h2>WITHDRAWAL</h2>
        <div class="card">
            <p>Balance: €100.65 &nbsp;|&nbsp; User: 123123</p>
            <input type="number" placeholder="Amount (min €10)" style="background:#0f1424; border:1px solid #2a3560; padding:12px; border-radius:30px; width:100%; margin:20px 0; color:white;">
            <div class="amount-options">
                <span class="amount-btn">€10</span><span class="amount-btn">€100</span><span class="amount-btn">€1,000</span><span class="amount-btn">€10,000</span>
            </div>
            <button style="background:#2f3b6e; padding:14px; width:100%; border:none; border-radius:40px; color:white;">Continue</button>
        </div>
    </main>
</div>
</body>
</html>
