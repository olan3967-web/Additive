<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDITIVE - Order Pool Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f2a; font-family: Arial, sans-serif; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #8ca3ff; }
        .stats { background: #0f1424; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .stats span { color: #ffd966; font-size: 24px; font-weight: bold; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-bar input { flex: 1; background: #1a1f3a; border: 1px solid #2a2e4a; padding: 10px; border-radius: 8px; color: #fff; }
        button { background: #2f3e7a; border: none; padding: 8px 16px; border-radius: 6px; color: #fff; cursor: pointer; }
        button.danger { background: #7a2f2f; }
        button.success { background: #2f7a3e; }
        table { width: 100%; border-collapse: collapse; background: #0f1424; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2e4a; }
        th { background: #1a1f3a; color: #8ca3ff; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 1000; visibility: hidden;
        }
        .modal.active { visibility: visible; }
        .modal-content { background: #0f1424; padding: 30px; border-radius: 16px; width: 500px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: #1a1f3a; border: 1px solid #2a2e4a; padding: 8px; border-radius: 6px; color: #fff; }
        .pagination { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .pagination button { padding: 5px 12px; }
        .current-page { background: #2f7a3e; }
        a { color: #8ca3ff; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏨 Order Pool Manager</h1>
    
    <div class="stats">
        📊 Total Orders: <span id="totalCount">0</span>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by Order Code or Hotel Name...">
        <button id="searchBtn">🔍 Search</button>
        <button id="clearBtn">🗑️ Clear</button>
        <button id="addBtn" class="success">➕ Add New Order</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>
    
    <div style="overflow-x: auto;">
        <table id="ordersTable">
            <thead>
                <tr><th>ID</th><th>Order Code</th><th>Hotel Name</th><th>Price (€)</th><th>Image</th><th>Status</th><th>Actions</th>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <div class="pagination" id="pagination"></div>
</div>

<!-- Add/Edit Modal -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New Order</h3>
        <div class="form-group"><label>Order Code *</label><input type="text" id="orderCode" placeholder="e.g., ORD-1234"></div>
        <div class="form-group"><label>Hotel Name *</label><input type="text" id="hotelName" placeholder="Hotel Name"></div>
        <div class="form-group"><label>Price (€) *</label><input type="number" id="price" step="0.01" placeholder="0.00"></div>
        <div class="form-group"><label>Image URL</label><textarea id="imageUrl" rows="2" placeholder="https://..."></textarea></div>
        <div class="form-group"><label>Status</label><select id="status"><option value="available">Available</option><option value="unavailable">Unavailable</option></select></div>
        <input type="hidden" id="editId" value="">
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="saveBtn" class="success">Save</button>
            <button id="cancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentPage = 1;
    const pageSize = 50;
    let totalRecords = 0;
    let searchKeyword = '';
    
    async function loadOrders() {
        try {
            let query = supabaseClient.from('orders_pool').select('*', { count: 'exact' });
            
            if(searchKeyword) {
                query = query.or(`order_code.ilike.%${searchKeyword}%,accommodation_name.ilike.%${searchKeyword}%`);
            }
            
            const { data, error, count } = await query
                .order('id', { ascending: false })
                .range((currentPage - 1) * pageSize, currentPage * pageSize - 1);
            
            if(error) throw error;
            
            totalRecords = count || 0;
            document.getElementById('totalCount').innerText = totalRecords;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders found</td></tr>';
                return;
            }
            
            for(let order of data) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = order.id;
                row.insertCell(1).innerText = order.order_code || '-';
                row.insertCell(2).innerText = order.accommodation_name || '-';
                row.insertCell(3).innerHTML = `€${(order.price || 0).toFixed(2)}`;
                row.insertCell(4).innerHTML = order.image_url ? `<a href="${order.image_url}" target="_blank">View</a>` : '-';
                row.insertCell(5).innerHTML = `<span style="color:${order.status === 'available' ? '#4ade80' : '#ff8888'}">${order.status || 'available'}</span>`;
                row.insertCell(6).innerHTML = `<button class="edit-btn" data-id="${order.id}" data-code="${order.order_code || ''}" data-name="${order.accommodation_name || ''}" data-price="${order.price || 0}" data-image="${order.image_url || ''}" data-status="${order.status || 'available'}" style="background:#2f7a3e;">✏️ Edit</button> <button class="delete-btn" data-id="${order.id}" class="danger">🗑️ Delete</button>`;
            }
            
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(
                    btn.dataset.id, btn.dataset.code, btn.dataset.name, 
                    btn.dataset.price, btn.dataset.image, btn.dataset.status
                ));
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteOrder(btn.dataset.id));
            });
            
            renderPagination();
        } catch(e) {
            console.error(e);
            alert('Error: ' + e.message);
        }
    }
    
    function renderPagination() {
        const totalPages = Math.ceil(totalRecords / pageSize);
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        
        if(totalPages <= 1) return;
        
        for(let i = 1; i <= Math.min(totalPages, 10); i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            if(i === currentPage) btn.classList.add('current-page');
            btn.onclick = () => { currentPage = i; loadOrders(); };
            container.appendChild(btn);
        }
    }
    
    function openEditModal(id, code, name, price, image, status) {
        document.getElementById('modalTitle').innerText = 'Edit Order';
        document.getElementById('orderCode').value = code || '';
        document.getElementById('hotelName').value = name || '';
        document.getElementById('price').value = price || '';
        document.getElementById('imageUrl').value = image || '';
        document.getElementById('status').value = status || 'available';
        document.getElementById('editId').value = id;
        document.getElementById('orderModal').classList.add('active');
    }
    
    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Add New Order';
        document.getElementById('orderCode').value = '';
        document.getElementById('hotelName').value = '';
        document.getElementById('price').value = '';
        document.getElementById('imageUrl').value = '';
        document.getElementById('status').value = 'available';
        document.getElementById('editId').value = '';
        document.getElementById('orderModal').classList.add('active');
    }
    
    async function saveOrder() {
        const id = document.getElementById('editId').value;
        const orderCode = document.getElementById('orderCode').value.trim();
        const hotelName = document.getElementById('hotelName').value.trim();
        const price = parseFloat(document.getElementById('price').value);
        const imageUrl = document.getElementById('imageUrl').value.trim();
        const status = document.getElementById('status').value;
        
        if(!orderCode || !hotelName || isNaN(price) || price <= 0) {
            alert('Order Code, Hotel Name, and valid Price are required');
            return;
        }
        
        try {
            if(id) {
                const { error } = await supabaseClient.from('orders_pool').update({
                    order_code: orderCode,
                    accommodation_name: hotelName,
                    price: price,
                    image_url: imageUrl,
                    status: status
                }).eq('id', parseInt(id));
                if(error) throw error;
                alert('Order updated successfully');
            } else {
                const { error } = await supabaseClient.from('orders_pool').insert([{
                    order_code: orderCode,
                    accommodation_name: hotelName,
                    price: price,
                    image_url: imageUrl,
                    status: status
                }]);
                if(error) throw error;
                alert('Order added successfully');
            }
            document.getElementById('orderModal').classList.remove('active');
            loadOrders();
        } catch(e) {
            alert('Error: ' + e.message);
        }
    }
    
    async function deleteOrder(id) {
        if(confirm('Delete this order permanently?')) {
            try {
                const { error } = await supabaseClient.from('orders_pool').delete().eq('id', parseInt(id));
                if(error) throw error;
                alert('Order deleted');
                loadOrders();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }
    }
    
    document.getElementById('searchBtn').onclick = () => {
        searchKeyword = document.getElementById('searchInput').value.trim();
        currentPage = 1;
        loadOrders();
    };
    document.getElementById('clearBtn').onclick = () => {
        document.getElementById('searchInput').value = '';
        searchKeyword = '';
        currentPage = 1;
        loadOrders();
    };
    document.getElementById('addBtn').onclick = openAddModal;
    document.getElementById('refreshBtn').onclick = () => loadOrders();
    document.getElementById('saveBtn').onclick = saveOrder;
    document.getElementById('cancelBtn').onclick = () => document.getElementById('orderModal').classList.remove('active');
    
    // 检查登录
    if(localStorage.getItem('admin_logged_in') !== 'true') {
        window.location.href = 'admin-login.html';
    }
    
    loadOrders();
</script>
\n</body>
</html>
