<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Products - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            display: flex;
            justify-content: center;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding-bottom: 80px;
            position: relative;
        }

        .products-header {
            padding: 20px 16px 10px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .header-sub {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 16px;
        }

        .filter-row {
            display: flex;
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .select-container {
            flex: 1;
            position: relative;
        }

        .select-trigger {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #33334e;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .select-trigger:hover {
            border-color: #ff7a00;
        }

        .trigger-text {
            flex: 1;
            text-align: left;
        }

        .trigger-icon {
            color: #ff7a00;
            font-size: 12px;
            transition: transform 0.3s ease;
        }

        .select-trigger.open .trigger-icon {
            transform: rotate(180deg);
        }

        .select-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #1a1a2e;
            border: 1px solid #33334e;
            border-radius: 14px;
            overflow: hidden;
            z-index: 100;
            max-height: 0;
            opacity: 0;
            visibility: hidden;
            transition: max-height 0.35s ease-out, opacity 0.25s ease, visibility 0.25s;
        }

        .select-dropdown.open {
            max-height: 280px;
            opacity: 1;
            visibility: visible;
        }

        .select-option {
            padding: 12px 16px;
            font-size: 13px;
            color: #cbd5e1;
            cursor: pointer;
            transition: background 0.2s;
        }

        .select-option:hover {
            background: rgba(255, 122, 0, 0.15);
            color: #ff7a00;
        }

        .select-option.selected {
            color: #ff7a00;
            background: rgba(255, 122, 0, 0.08);
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 8px;
            align-items: start;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eef2f7;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .product-card-right {
            transform: translateY(-4px);
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .product-card-right:hover {
            transform: translateY(-6px);
        }

        .product-image {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: linear-gradient(135deg, #f0f2f5, #e8ecf1);
        }

        .product-info {
            padding: 10px;
        }

        .product-name {
            font-size: 12px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35;
            min-height: 32px;
        }

        .product-price {
            font-size: 15px;
            font-weight: 700;
            color: #ff7a00;
            margin-bottom: 6px;
        }

        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }

        .tag {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .tag-trending { background: linear-gradient(135deg, #ff7a00, #ff9f43); color: white; }
        .tag-best { background: #fef9e6; color: #b45f06; border: 1px solid #fde68a; }
        .tag-eco { background: #e6f7ec; color: #2e7d32; border: 1px solid #a5d6a7; }
        .tag-new { background: #e8f0fe; color: #1a56db; border: 1px solid #b3d4ff; }
        .tag-high { background: #fee8e8; color: #c62828; border: 1px solid #ffcdd2; }
        .tag-exclusive { background: #1a1a2e; color: #ff9f43; border: 1px solid #ff7a00; }
        .tag-limited { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }

        .product-margin {
            font-size: 10px;
            color: #10b981;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .margin-badge {
            background: #e8f5e9;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 9px;
            color: #2e7d32;
        }

        .margin-amount {
            font-weight: 500;
            color: #059669;
            font-size: 10px;
        }

        .add-btn {
            width: 100%;
            background: #fff3e8;
            border: none;
            padding: 8px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            color: #ff7a00;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: #ff7a00;
            color: white;
        }

        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner i {
            font-size: 40px;
            color: #ff7a00;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .load-more-container {
            text-align: center;
            padding: 20px;
        }

        .load-more-btn {
            background: white;
            border: 1px solid #eef2f7;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #ff7a00;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            background: #ff7a00;
            color: white;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            cursor: pointer;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        @media (max-width: 390px) {
            .phone { width: 100%; }
        }
    </style>
</head>
<body>
<div class="phone">

    <div class="products-header">
        <div class="header-title">Products</div>
        <div class="header-sub">Discover premium items</div>
    </div>

    <div class="filter-row">
        <div class="select-container" id="itemsContainer">
            <div class="select-trigger" id="itemsTrigger">
                <span class="trigger-text" id="itemsText">All Items</span>
                <i class="fas fa-chevron-down trigger-icon"></i>
            </div>
            <div class="select-dropdown" id="itemsDropdown">
                <div class="select-option selected" data-value="all" data-label="All Items">All Items</div>
                <div class="select-option" data-value="trending" data-label="Trending">Trending</div>
                <div class="select-option" data-value="new" data-label="New Arrivals">New Arrivals</div>
                <div class="select-option" data-value="eco" data-label="Eco-Friendly">Eco-Friendly</div>
                <div class="select-option" data-value="high" data-label="High Profit">High Profit</div>
            </div>
        </div>

        <div class="select-container" id="sortContainer">
            <div class="select-trigger" id="sortTrigger">
                <span class="trigger-text" id="sortText">Sort By</span>
                <i class="fas fa-chevron-down trigger-icon"></i>
            </div>
            <div class="select-dropdown" id="sortDropdown">
                <div class="select-option selected" data-value="default" data-label="Sort By">Sort By</div>
                <div class="select-option" data-value="price_desc" data-label="Price High To Low">Price High To Low</div>
                <div class="select-option" data-value="price_asc" data-label="Price Low To High">Price Low To High</div>
                <div class="select-option" data-value="margin_desc" data-label="High Margin">High Margin</div>
                <div class="select-option" data-value="margin_asc" data-label="Low Margin">Low Margin</div>
            </div>
        </div>
    </div>

    <div class="products-grid" id="productsGrid">
        <div class="loading-container">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <div style="margin-top: 10px; font-size: 13px; color: #6b7280;">Loading products...</div>
            </div>
        </div>
    </div>

    <div class="load-more-container" id="loadMoreContainer" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item active" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allProducts = [];
    let filteredProducts = [];
    let currentCategory = 'all';
    let currentSort = 'default';
    let displayCount = 10;

    // ========== 根据价格区间计算 Margin ==========
    function getMarginByPrice(price) {
        let minPercent = 0;
        let maxPercent = 0;
        
        if (price >= 1 && price <= 100) {
            minPercent = 4.5;
            maxPercent = 5.0;
        } else if (price >= 101 && price <= 500) {
            minPercent = 5.1;
            maxPercent = 10.0;
        } else if (price >= 501 && price <= 1000) {
            minPercent = 10.1;
            maxPercent = 15.0;
        } else if (price >= 1001 && price <= 3000) {
            minPercent = 15.1;
            maxPercent = 20.0;
        } else if (price >= 3001 && price <= 5000) {
            minPercent = 20.1;
            maxPercent = 25.0;
        } else if (price > 5000) {
            minPercent = 25.1;
            maxPercent = 30.0;
        } else {
            minPercent = 4.5;
            maxPercent = 5.0;
        }
        
        const percent = minPercent + Math.random() * (maxPercent - minPercent);
        const finalPercent = Math.round(percent * 10) / 10;
        const profit = (price * finalPercent / 100).toFixed(0);
        
        return { percent: finalPercent, profit: parseFloat(profit) };
    }

    // ========== 动态生成标签（每个产品不同） ==========
    function getProductTags(product, marginPercent) {
        const tags = [];
        const price = product.price;
        const random = Math.random();
        
        // 价格标签（根据价格范围）
        if (price >= 300) {
            tags.push({ type: 'premium', label: 'Premium', class: 'tag-exclusive' });
        } else if (price >= 150 && price < 300) {
            tags.push({ type: 'mid', label: 'Popular', class: 'tag-best' });
        } else if (price < 50) {
            tags.push({ type: 'budget', label: 'Budget', class: 'tag-eco' });
        }
        
        // 根据 Margin 高低判断
        if (marginPercent >= 18) {
            tags.push({ type: 'high_margin', label: 'High Profit', class: 'tag-high' });
        } else if (marginPercent <= 7) {
            tags.push({ type: 'low_margin', label: 'Standard', class: 'tag-eco' });
        }
        
        // 随机标签（让产品更多样化）
        if (random < 0.25 && !tags.some(t => t.label === 'Trending')) {
            tags.push({ type: 'trending', label: 'Trending', class: 'tag-trending' });
        }
        
        if (random > 0.75 && !tags.some(t => t.label === 'Limited')) {
            tags.push({ type: 'limited', label: 'Limited', class: 'tag-limited' });
        }
        
        if (price > 800 && !tags.some(t => t.label === 'Luxury')) {
            tags.push({ type: 'luxury', label: 'Luxury', class: 'tag-exclusive' });
        }
        
        // 限制最多 2 个标签，至少保留 1 个
        if (tags.length === 0) {
            if (price >= 100) {
                tags.push({ type: 'standard', label: 'Standard', class: 'tag-best' });
            } else {
                tags.push({ type: 'value', label: 'Value', class: 'tag-eco' });
            }
        }
        
        // 返回最多 2 个标签，并映射 CSS 类
        return tags.slice(0, 2).map(tag => ({
            label: tag.label,
            class: tag.class
        }));
    }

    const categoryMap = {
        all: { filter: () => true, label: 'All Items' },
        trending: { filter: (p) => p.price > 70, label: 'Trending' },
        new: { filter: (p) => p.id > 50, label: 'New Arrivals' },
        eco: { filter: (p) => p.price < 40, label: 'Eco-Friendly' },
        high: { filter: (p) => p.price > 120, label: 'High Profit' }
    };

    function sortProducts(products, sortType) {
        const sorted = [...products];
        switch (sortType) {
            case 'price_asc':
                return sorted.sort((a, b) => a.price - b.price);
            case 'price_desc':
                return sorted.sort((a, b) => b.price - a.price);
            case 'margin_desc':
                return sorted.sort((a, b) => getMarginByPrice(b.price).percent - getMarginByPrice(a.price).percent);
            case 'margin_asc':
                return sorted.sort((a, b) => getMarginByPrice(a.price).percent - getMarginByPrice(b.price).percent);
            default:
                return sorted;
        }
    }

    function applyFilterAndSort() {
        const filterFn = categoryMap[currentCategory]?.filter || (() => true);
        let filtered = allProducts.filter(filterFn);
        filtered = sortProducts(filtered, currentSort);
        filteredProducts = filtered;
        displayCount = 10;
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;

        const toShow = filteredProducts.slice(0, displayCount);
        const hasMore = filteredProducts.length > displayCount;
        document.getElementById('loadMoreContainer').style.display = hasMore ? 'block' : 'none';

        if (toShow.length === 0 && filteredProducts.length === 0) {
            grid.innerHTML = '<div class="empty-state">No products found</div>';
            return;
        }

        let html = '';
        toShow.forEach((product, index) => {
            const margin = getMarginByPrice(product.price);
            const tags = getProductTags(product, margin.percent);
            const isRightColumn = (index % 2 === 1);
            
            const tagsHtml = tags.map(tag => 
                `<span class="tag ${tag.class}">${tag.label}</span>`
            ).join('');

            html += `
                <div class="product-card ${isRightColumn ? 'product-card-right' : ''}" data-id="${product.id}">
                    <img class="product-image" src="${product.image_url || ''}" 
                         onerror="this.src='https://placehold.co/400x280/f0f2f5/94a3b8?text=Product'">
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.accommodation_name || 'Premium Task')}</div>
                        <div class="product-price">€${product.price.toFixed(2)}</div>
                        ${tagsHtml ? `<div class="product-tags">${tagsHtml}</div>` : ''}
                        <div class="product-margin">
                            <span class="margin-badge">+${margin.percent}% Margin</span>
                            <span class="margin-amount">+€${margin.profit} profit</span>
                        </div>
                        <button class="add-btn" data-id="${product.id}" data-price="${product.price}">
                            <i class="fas fa-plus-circle"></i> Add Product
                        </button>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;

        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const price = parseFloat(btn.dataset.price);
                addToCart(id, price);
            });
        });

        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('add-btn')) return;
                const id = card.dataset.id;
                const product = allProducts.find(p => p.id == id);
                if (product) {
                    alert(`📦 ${product.accommodation_name || 'Premium Task'}\nPrice: €${product.price}\nStart task to earn commission`);
                }
            });
        });
    }

    function loadMore() {
        if (displayCount < filteredProducts.length) {
            displayCount = Math.min(displayCount + 10, filteredProducts.length);
            renderProducts();
        }
    }

    async function addToCart(productId, price) {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'signin.html';
            return;
        }

        const { data: userData } = await sb
            .from('users')
            .select('balance')
            .eq('uid', user.uid)
            .single();

        if (!userData || userData.balance < price) {
            alert(`Insufficient balance! Need €${price.toFixed(2)}`);
            return;
        }

        const newBalance = userData.balance - price;
        await sb.from('users').update({ balance: newBalance }).eq('uid', user.uid);
        user.balance = newBalance;
        localStorage.setItem('currentUser', JSON.stringify(user));

        alert(`✅ Product added! €${price.toFixed(2)} deducted. Go to START to complete.`);
    }

    function getCurrentUser() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) return null;
        try { return JSON.parse(userStr); } catch(e) { return null; }
    }

    async function loadProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = `
            <div class="loading-container">
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <div style="margin-top: 10px; font-size: 13px; color: #6b7280;">Loading products...</div>
                </div>
            </div>
        `;

        try {
            const { data, error } = await sb
                .from('orders_pool')
                .select('*')
                .eq('status', 'available')
                .order('price', { ascending: false });

            if (error) throw error;

            allProducts = data || [];
            
            if (allProducts.length === 0) {
                allProducts = [
                    { id: 1, accommodation_name: 'Luxury Beach Resort', price: 299, image_url: '' },
                    { id: 2, accommodation_name: 'Mountain View Hotel', price: 189, image_url: '' },
                    { id: 3, accommodation_name: 'City Central Inn', price: 99, image_url: '' },
                    { id: 4, accommodation_name: 'Seaside Villa', price: 449, image_url: '' },
                    { id: 5, accommodation_name: 'Cozy Boutique', price: 159, image_url: '' },
                    { id: 6, accommodation_name: 'Business Suite', price: 249, image_url: '' },
                    { id: 7, accommodation_name: 'Eco Lodge', price: 79, image_url: '' },
                    { id: 8, accommodation_name: 'Sunset Resort', price: 359, image_url: '' },
                    { id: 9, accommodation_name: 'Grand Hotel', price: 520, image_url: '' },
                    { id: 10, accommodation_name: 'Urban Stay', price: 129, image_url: '' }
                ];
            }

            applyFilterAndSort();
        } catch (e) {
            console.error('加载失败:', e);
            grid.innerHTML = '<div class="empty-state">Failed to load products</div>';
        }
    }

    function closeAllDropdowns(exceptId) {
        const containers = ['itemsContainer', 'sortContainer'];
        containers.forEach(id => {
            if (id !== exceptId) {
                const container = document.getElementById(id);
                const trigger = container.querySelector('.select-trigger');
                const dropdown = container.querySelector('.select-dropdown');
                trigger.classList.remove('open');
                dropdown.classList.remove('open');
            }
        });
    }

    function initSelect(containerId, textSpanId, isCategory = false) {
        const container = document.getElementById(containerId);
        const trigger = container.querySelector('.select-trigger');
        const dropdown = container.querySelector('.select-dropdown');
        const textSpan = document.getElementById(textSpanId);
        
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = trigger.classList.contains('open');
            closeAllDropdowns(containerId);
            if (!isOpen) {
                trigger.classList.add('open');
                dropdown.classList.add('open');
            }
        });
        
        const options = dropdown.querySelectorAll('.select-option');
        options.forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                const value = opt.dataset.value;
                const label = opt.dataset.label;
                textSpan.textContent = label;
                trigger.classList.remove('open');
                dropdown.classList.remove('open');
                
                options.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                
                if (isCategory) {
                    currentCategory = value;
                } else {
                    currentSort = value;
                }
                applyFilterAndSort();
            });
        });
    }

    function setupBottomNav() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page === 'dashboard') {
                    window.location.href = 'start.html';
                } else if (page === 'products') {
                    window.location.href = 'products.html';
                } else if (page === 'orders') {
                    window.location.href = 'history.html';
                } else if (page === 'profile') {
                    window.location.href = 'dashboard.html';
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    document.getElementById('loadMoreBtn')?.addEventListener('click', loadMore);
    document.addEventListener('click', () => closeAllDropdowns(null));

    initSelect('itemsContainer', 'itemsText', true);
    initSelect('sortContainer', 'sortText', false);
    setupBottomNav();
    loadProducts();
</script>
</body>
</html>
