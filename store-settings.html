<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Store Settings - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
<script src="notification.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding-bottom: 80px;
            position: relative;
        }

        .header {
            background: white;
            padding: 20px 20px 16px;
            border-bottom: 1px solid #eef2f7;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #6b7280;
        }

        .form-container {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i {
            color: #ff7a00;
            font-size: 14px;
        }

        .required {
            color: #ef4444;
            font-size: 12px;
        }

        .optional {
            color: #94a3b8;
            font-size: 11px;
            font-weight: normal;
        }

        input, textarea, select {
            width: 100%;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 14px;
            color: #1f2937;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #ff7a00;
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.1);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .upload-area {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo-preview {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #fff7ed, #ffe7cc);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #eef2f7;
            cursor: pointer;
            position: relative;
        }

        .logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-preview i {
            font-size: 32px;
            color: #ff7a00;
        }

        .logo-preview .edit-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 10px;
            text-align: center;
            padding: 4px;
            display: none;
        }

        .logo-preview:hover .edit-overlay {
            display: block;
        }

        .upload-btn {
            background: #fff3e8;
            border: 1px solid #ffe7cc;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #ff7a00;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: #ff7a00;
            color: white;
        }

        .crop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .crop-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .crop-container {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }

        .crop-image {
            max-width: 100%;
            max-height: 300px;
        }

        .crop-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .crop-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .crop-confirm {
            background: #ff7a00;
            color: white;
        }

        .crop-cancel {
            background: #334155;
            color: white;
        }

        .categories-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .category-tag {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 12px;
            color: #1f2937;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .category-tag i {
            color: #ff7a00;
            font-size: 10px;
            cursor: pointer;
        }

        .category-tag:hover {
            background: #fff3e8;
            border-color: #ff7a00;
        }

        .add-category {
            background: transparent;
            border: 1px dashed #cbd5e1;
            color: #94a3b8;
        }

        .save-btn {
            width: 100%;
            background: #ff7a00;
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #ea580c;
            transform: scale(1.01);
        }

        .divider {
            height: 1px;
            background: #eef2f7;
            margin: 20px 0;
        }

        .error-message {
            color: #ef4444;
            font-size: 11px;
            margin-top: 6px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #9ca3af;
    cursor: pointer;
    position: relative;  /* 👈 Add这一行 */
}

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <h1>Store Settings</h1>
            <p>Manage your store information</p>
        </div>

        <div class="form-container">
            <div class="form-group">
                <div class="form-label">
                    <i class="fa-regular fa-building"></i> Store Name
                    <span class="required">*</span>
                </div>
                <input type="text" id="storeName" placeholder="Enter store name">
                <div class="error-message" id="storeNameError"></div>
            </div>

            <div class="form-group">
                <div class="form-label">
                    <i class="fa-regular fa-image"></i> Store Logo
                    <span class="optional">(optional)</span>
                </div>
                <div class="upload-area">
                    <div class="logo-preview" id="logoPreview">
                        <i class="fa-regular fa-store"></i>
                        <div class="edit-overlay">Edit</div>
                    </div>
                    <button class="upload-btn" id="uploadLogoBtn">
                        <i class="fa-solid fa-upload"></i> Upload Logo
                    </button>
                    <input type="file" id="logoFile" accept="image/*" style="display: none;">
                </div>
            </div>

            <div class="form-group">
                <div class="form-label">
                    <i class="fa-regular fa-file-lines"></i> Store Description
                    <span class="required">*</span>
                </div>
                <textarea id="storeDesc" placeholder="Describe your store..."></textarea>
                <div class="error-message" id="storeDescError"></div>
            </div>

            <div class="form-group">
                <div class="form-label">
                    <i class="fa-regular fa-tag"></i> Store Category
                    <span class="required">*</span>
                </div>
                <div class="categories-preview" id="categoriesContainer"></div>
                <div class="error-message" id="categoryError"></div>
                <select id="categorySelect" style="display: none; margin-top: 10px;">
                    <option value="">Select category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home & Kitchen">Home & Kitchen</option>
                    <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                    <option value="Sports & Outdoors">Sports & Outdoors</option>
                    <option value="Toys & Games">Toys & Games</option>
                    <option value="Automotive">Automotive</option>
                    <option value="Pet Supplies">Pet Supplies</option>
                </select>
            </div>

            <div class="divider"></div>

            <button class="save-btn" id="saveBtn">
                <i class="fa-regular fa-floppy-disk"></i> Save Settings
            </button>
        </div>
    </div>

    <div class="crop-modal" id="cropModal">
        <div class="crop-container">
            <img id="cropImage" class="crop-image">
            <div class="crop-buttons">
                <button class="crop-btn crop-cancel" id="cropCancel">Cancel</button>
                <button class="crop-btn crop-confirm" id="cropConfirm">Apply</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item active" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script>
        let cropper = null;
        let currentImageFile = null;
        let logoImageUrl = null;
        let currentCategories = [];
        let onboardingData = {
            storeName: '',
            categories: [],
            storeDesc: ''
        };

        function getCurrentUser() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return null;
            try { return JSON.parse(userStr); } catch(e) { return null; }
        }

        async function loadOnboardingData() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }

            const { data: storeData, error: storeError } = await sb
                .from('user_store_settings')
                .select('*')
                .eq('uid', user.uid)
                .single();

            if (!storeError && storeData) {
                onboardingData.storeName = storeData.store_name || '';
                onboardingData.storeDesc = storeData.store_description || '';
                if (storeData.store_category) {
                    onboardingData.categories = storeData.store_category.split(',');
                }
                if (storeData.store_logo) {
                    logoImageUrl = storeData.store_logo;
                    const preview = document.getElementById('logoPreview');
                    preview.innerHTML = `<img src="${logoImageUrl}" style="width:100%; height:100%; object-fit:cover;"><div class="edit-overlay">Edit</div>`;
                }
            } else {
                const savedOnboarding = localStorage.getItem('onboarding_data');
                if (savedOnboarding) {
                    try {
                        const onboarding = JSON.parse(savedOnboarding);
                        onboardingData.storeName = onboarding.storeName || '';
                        onboardingData.categories = onboarding.categories || [];
                        onboardingData.storeDesc = onboarding.storeDesc || '';
                    } catch(e) {}
                }
            }

            document.getElementById('storeName').value = onboardingData.storeName || '';
            document.getElementById('storeDesc').value = onboardingData.storeDesc || '';
            currentCategories = [...onboardingData.categories];
            renderCategories();
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            
            currentCategories.forEach(cat => {
                const tag = document.createElement('span');
                tag.className = 'category-tag';
                tag.innerHTML = `${cat} <i class="fa-regular fa-circle-xmark" data-category="${cat}"></i>`;
                container.appendChild(tag);
            });
            
            const addBtn = document.createElement('span');
            addBtn.className = 'category-tag add-category';
            addBtn.id = 'addCategoryBtn';
            addBtn.innerHTML = '+ Add Category';
            container.appendChild(addBtn);
            
            document.querySelectorAll('.category-tag i').forEach(icon => {
                icon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cat = icon.getAttribute('data-category');
                    if (cat) {
                        currentCategories = currentCategories.filter(c => c !== cat);
                        renderCategories();
                        validateCategories();
                    }
                });
            });
            
            const addBtnEl = document.getElementById('addCategoryBtn');
            if (addBtnEl) {
                addBtnEl.addEventListener('click', showCategorySelect);
            }
            
            validateCategories();
        }

        function validateCategories() {
            const errorEl = document.getElementById('categoryError');
            if (currentCategories.length === 0) {
                errorEl.textContent = 'Please select at least one category';
                return false;
            } else {
                errorEl.textContent = '';
                return true;
            }
        }

        function showCategorySelect() {
            const select = document.getElementById('categorySelect');
            select.style.display = 'block';
            select.focus();
            
            const handleSelect = () => {
                const value = select.value;
                if (value && !currentCategories.includes(value)) {
                    currentCategories.push(value);
                    renderCategories();
                }
                select.style.display = 'none';
                select.value = '';
                select.removeEventListener('change', handleSelect);
                select.removeEventListener('blur', handleBlur);
            };
            
            const handleBlur = () => {
                setTimeout(() => {
                    if (select.style.display === 'block') {
                        select.style.display = 'none';
                        select.value = '';
                        select.removeEventListener('change', handleSelect);
                        select.removeEventListener('blur', handleBlur);
                    }
                }, 200);
            };
            
            select.addEventListener('change', handleSelect);
            select.addEventListener('blur', handleBlur);
        }

        document.getElementById('uploadLogoBtn')?.addEventListener('click', () => {
            document.getElementById('logoFile').click();
        });
        
        document.getElementById('logoFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const imageUrl = event.target.result;
                    const cropModal = document.getElementById('cropModal');
                    const cropImage = document.getElementById('cropImage');
                    cropImage.src = imageUrl;
                    cropModal.classList.add('active');
                    
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 1,
                        viewMode: 1,
                        movable: true,
                        zoomable: true,
                        scalable: true,
                        autoCropArea: 0.8,
                        cropBoxResizable: true,
                        background: false
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('cropConfirm')?.addEventListener('click', () => {
            if (cropper) {
                const canvas = cropper.getCroppedCanvas({
                    width: 200,
                    height: 200
                });
                logoImageUrl = canvas.toDataURL('image/jpeg', 0.9);
                const preview = document.getElementById('logoPreview');
                preview.innerHTML = `<img src="${logoImageUrl}" style="width:100%; height:100%; object-fit:cover;"><div class="edit-overlay">Edit</div>`;
                cropper.destroy();
                cropper = null;
                document.getElementById('cropModal').classList.remove('active');
            }
        });

        document.getElementById('cropCancel')?.addEventListener('click', () => {
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            document.getElementById('cropModal').classList.remove('active');
        });

        document.getElementById('logoPreview')?.addEventListener('click', () => {
            if (logoImageUrl) {
                document.getElementById('logoFile').click();
            }
        });

        function validateForm() {
            let isValid = true;
            
            const storeName = document.getElementById('storeName').value.trim();
            const storeDesc = document.getElementById('storeDesc').value.trim();
            
            if (!storeName) {
                document.getElementById('storeNameError').textContent = 'Store name is required';
                isValid = false;
            } else {
                document.getElementById('storeNameError').textContent = '';
            }
            
            if (!storeDesc) {
                document.getElementById('storeDescError').textContent = 'Store description is required';
                isValid = false;
            } else {
                document.getElementById('storeDescError').textContent = '';
            }
            
            if (!validateCategories()) {
                isValid = false;
            }
            
            return isValid;
        }

        document.getElementById('saveBtn')?.addEventListener('click', async () => {
            if (!validateForm()) {
                showToast('Please fill in all required fields', 'error');
                return;
            }
            
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }
            
            const storeName = document.getElementById('storeName').value.trim();
            const storeDesc = document.getElementById('storeDesc').value.trim();
            
            try {
                await sb
                    .from('user_store_settings')
                    .delete()
                    .eq('uid', user.uid);
                
                const { error: storeError } = await sb
                    .from('user_store_settings')
                    .insert({
                        uid: user.uid,
                        store_name: storeName,
                        store_logo: logoImageUrl || null,
                        store_description: storeDesc,
                        store_category: currentCategories.join(','),
                        updated_at: new Date().toISOString()
                    });
                
                if (storeError) throw storeError;
                
                await sb
                    .from('user_onboarding')
                    .delete()
                    .eq('uid', user.uid);
                
                const { error: onboardingError } = await sb
                    .from('user_onboarding')
                    .insert({
                        uid: user.uid,
                        step1_completed: true,
                        updated_at: new Date().toISOString()
                    });
                
                if (onboardingError) throw onboardingError;
                
                showToast('Store settings saved successfully!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (err) {
                console.error('Save失败:', err);
                showToast('Save failed: ' + err.message, 'error');
            }
        });

        function setupBottomNav() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    if (page === 'dashboard') window.location.href = 'start.html';
                    else if (page === 'products') window.location.href = 'products.html';
                    else if (page === 'orders') window.location.href = 'orders-history.html';
                    else if (page === 'profile') window.location.href = 'dashboard.html';
                });
            });
        }

        setupBottomNav();
        loadOnboardingData();
    </script>
\n</body>
</html>
