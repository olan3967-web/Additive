<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Order Tracking - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
<script src="notification.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            display: flex;
            justify-content: center;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding-bottom: 80px;
            position: relative;
        }

        .page-header {
            padding: 20px 16px 10px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            flex: 1;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #ff7a00;
            cursor: pointer;
        }

        .order-info {
            background: white;
            margin: 0 16px 20px;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #eef2f7;
        }

        .order-no {
            font-size: 14px;
            font-weight: 600;
            color: #ff7a00;
            font-family: monospace;
            margin-bottom: 8px;
        }

        .order-date {
            font-size: 12px;
            color: #6b7280;
        }

        /* 物流时间线 */
        .timeline-container {
            background: white;
            margin: 0 16px 20px;
            padding: 24px 20px;
            border-radius: 24px;
            border: 1px solid #eef2f7;
        }

        .timeline-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-title i {
            color: #ff7a00;
        }

        .timeline-item {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            position: relative;
        }

        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 40px;
            bottom: -8px;
            width: 2px;
            background: #e2e8f0;
        }

        .timeline-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            z-index: 1;
        }

        .timeline-icon.completed {
            background: #10b981;
            color: white;
        }

        .timeline-icon.current {
            background: #ff7a00;
            color: white;
            animation: pulse 1.5s infinite;
        }

        .timeline-icon.pending {
            background: #e2e8f0;
            color: #94a3b8;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 122, 0, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(255, 122, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 122, 0, 0); }
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-status {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .timeline-time {
            font-size: 11px;
            color: #94a3b8;
        }

        .timeline-item.completed .timeline-status {
            color: #10b981;
        }

        .timeline-item.current .timeline-status {
            color: #ff7a00;
        }

        .timeline-item.pending .timeline-status {
            color: #94a3b8;
        }

        .current-status-card {
            background: linear-gradient(135deg, #fff7ed, #ffe7cc);
            margin: 0 16px 20px;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 122, 0, 0.2);
        }

        .current-status-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .current-status-text {
            font-size: 16px;
            font-weight: 700;
            color: #ff7a00;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #9ca3af;
    cursor: pointer;
    position: relative;  /* 👈 添加这一行 */
}

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="phone">

    <div class="page-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Order Tracking</h1>
        <div style="width: 30px;"></div>
    </div>

    <div id="orderInfo" class="order-info"></div>

    <div id="currentStatusCard" class="current-status-card"></div>

    <div id="timelineContainer" class="timeline-container"></div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item active" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>

</div>

<script>
    let orderData = null;
    let checkInterval = null;

    function getCurrentUser() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) return null;
        try { return JSON.parse(userStr); } catch(e) { return null; }
    }

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    async function loadOrder() {
        const orderNo = getQueryParam('order_no');
        if (!orderNo) {
            showToast('订单号不存在', 'error');
            setTimeout(() => goBack(), 1500);
            return;
        }

        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'signin.html';
            return;
        }

        const { data: order, error } = await sb
            .from('user_orders')
            .select('*')
            .eq('order_no', orderNo)
            .eq('uid', user.uid)
            .single();

        if (error || !order) {
            showToast('订单不存在', 'error');
            setTimeout(() => goBack(), 1500);
            return;
        }

        orderData = order;
        renderOrderInfo();
        renderTimeline();
        startAutoRefresh();
    }

    function renderOrderInfo() {
        const container = document.getElementById('orderInfo');
        if (!container) return;

        let productsText = '';
        try {
            const products = JSON.parse(orderData.products || '[]');
            productsText = products.map(p => `${p.product_name} ×${p.quantity}`).join(', ');
        } catch(e) {
            productsText = orderData.products || '-';
        }

        container.innerHTML = `
            <div class="order-no">${orderData.order_no}</div>
            <div class="order-date">下单时间：${formatDate(orderData.created_at)}</div>
            <div class="order-date" style="margin-top:8px;">产品：${productsText}</div>
            <div class="order-date">总金额：€${(orderData.total_supply_price || 0).toFixed(2)}</div>
        `;
    }

    function renderTimeline() {
    const timelineContainer = document.getElementById('timelineContainer');
    const currentStatusCard = document.getElementById('currentStatusCard');
    
    if (!timelineContainer) return;

    let timeline = [];
    try {
        timeline = JSON.parse(orderData.tracking_timeline || '[]');
    } catch(e) {
        timeline = [];
    }

    if (timeline.length === 0) {
        timelineContainer.innerHTML = '<div style="text-align:center; padding:40px;">物流信息加载中...</div>';
        return;
    }

    const now = new Date();
    let currentIndex = -1;
    
    for (let i = 0; i < timeline.length; i++) {
        const itemTime = new Date(timeline[i].time);
        if (itemTime <= now) {
            currentIndex = i;
        } else {
            break;
        }
    }

    const lastStatus = timeline[timeline.length - 1];
    if (lastStatus && new Date(lastStatus.time) <= now && orderData.status !== 'delivered') {
        markAsDelivered();
    }

    if (currentIndex >= 0 && timeline[currentIndex]) {
        const currentStatus = timeline[currentIndex];
        currentStatusCard.innerHTML = `
            <div class="current-status-label">当前状态</div>
            <div class="current-status-text"><i class="fas fa-truck"></i> ${currentStatus.status}</div>
            <div class="current-status-label" style="margin-top:8px;">更新时间：${formatDate(currentStatus.time)}</div>
        `;
    } else {
        currentStatusCard.innerHTML = `
            <div class="current-status-label">当前状态</div>
            <div class="current-status-text">等待物流更新...</div>
        `;
    }

    timelineContainer.innerHTML = `
        <div class="timeline-title">
            <i class="fas fa-road"></i> 物流追踪
        </div>
        <div class="timeline-items">
            ${timeline.map((item, index) => {
                let statusClass = 'pending';
                let icon = 'far fa-circle';
                let iconBg = '#e2e8f0';
                let showTime = false;
                
                const itemTime = new Date(item.time);
                
                if (index < currentIndex) {
                    statusClass = 'completed';
                    icon = 'fas fa-check-circle';
                    iconBg = '#10b981';
                    showTime = true;
                } else if (index === currentIndex) {
                    statusClass = 'current';
                    icon = 'fas fa-circle';
                    iconBg = '#ff7a00';
                    showTime = true;
                } else {
                    statusClass = 'pending';
                    icon = 'far fa-circle';
                    iconBg = '#e2e8f0';
                    showTime = false;
                }
                
                return `
                    <div class="timeline-item ${statusClass}">
                        <div class="timeline-icon ${statusClass}" style="background: ${iconBg};">
                            <i class="${icon}"></i>
                        </div>
                        <div class="timeline-content">
                            <div class="timeline-status">${item.status}</div>
                            ${showTime ? `<div class="timeline-time">${formatDate(item.time)}</div>` : '<div class="timeline-time" style="color:#e2e8f0;">⏳ 待更新</div>'}
                        </div>
                    </div>
                `;
            }).join('')}
        </div>
    `;
}

    async function markAsDelivered() {
        if (!orderData || orderData.status === 'delivered') return;
        
        await sb.from('user_orders').update({
            status: 'delivered',
            tracking_status: 'delivered'
        }).eq('order_no', orderData.order_no);
        
        orderData.status = 'delivered';
        showToast('订单已送达！', 'success');
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleString('en-US', {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function startAutoRefresh() {
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            if (!orderData) return;
            
            const { data: freshOrder, error } = await sb
                .from('user_orders')
                .select('*')
                .eq('order_no', orderData.order_no)
                .single();
            
            if (!error && freshOrder) {
                orderData = freshOrder;
                renderTimeline();
            }
        }, 10000);
    }

    function goBack() {
        if (checkInterval) clearInterval(checkInterval);
        window.location.href = 'orders.html';
    }

    function setupBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page === 'dashboard') window.location.href = 'start.html';
                else if (page === 'products') window.location.href = 'products.html';
                else if (page === 'orders') window.location.href = 'orders-history.html';
                else if (page === 'profile') window.location.href = 'dashboard.html';
            });
        });
    }

    setupBottomNav();
    loadOrder();
</script>
</body>
</html>
