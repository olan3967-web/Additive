<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDITIVE - History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f1c;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        .app { display: flex; }
        .sidebar {
            width: 260px;
            background: #0f1322;
            padding: 32px 20px;
        }
        .nav-item {
            display: block;
            padding: 10px 16px;
            color: #a3aed4;
            text-decoration: none;
        }
        .active { background: #1e2a4e; color: white; border-radius: 12px; }
        .main { flex: 1; padding: 32px 40px; }
        .timeline-tabs { display: flex; gap: 20px; margin: 30px 0; border-bottom: 1px solid #1f2848; }
        .tab { padding: 8px 0; cursor: pointer; }
        .no-data { background: #0f1424; padding: 40px; text-align: center; border-radius: 32px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo" style="font-size:24px;">ADDITIVE*</div>
        <div class="nav">
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="start.html" class="nav-item">Start</a>
            <a href="history.html" class="nav-item active">History</a>
            <a href="signin.html" class="nav-item">Sign in</a>
            <a href="withdrawal.html" class="nav-item">Withdrawal</a>
            <a href="chat.html" class="nav-item">Chat with us</a>
            <a href="settings.html" class="nav-item">Settings</a>
        </div>
    </aside>
    <main class="main">
        <h2>HISTORY</h2>
        <p>Review your balance movements, completed hotel tasks, and reward activity.</p>
        <div class="timeline-tabs">
            <div class="tab">ACCOUNT TIMELINE</div>
            <div class="tab">Balance History</div>
            <div class="tab">Orders History</div>
        </div>
        <div class="no-data">No history found.</div>
        <div style="display:flex; gap:20px; margin-top:20px;">
            <div class="no-data" style="flex:1">BALANCE HISTORY<br>Deposits & withdrawals</div>
            <div class="no-data" style="flex:1">ORDERS HISTORY<br>Completed tasks</div>
        </div>
    </main>
</div>
</body>
</html>
