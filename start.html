<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数字滚动效果 · 优雅慢速</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d5 100%);
            font-family: 'Inter', sans-serif;
            padding: 40px 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .header h1 span {
            color: #ff7a00;
        }

        .header p {
            color: #6b7280;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        .card.selected {
            border: 2px solid #ff7a00;
            box-shadow: 0 8px 28px rgba(255, 122, 0, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
        }

        .preview-badge {
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ff7a00;
            font-weight: 600;
        }

        .number-display {
            margin-bottom: 20px;
        }

        .number-value {
            font-size: 42px;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -1px;
        }

        .number-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .effect-demo {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0e8e0;
            font-size: 12px;
            color: #6b7280;
        }

        .effect-demo span {
            color: #ff7a00;
            font-weight: 600;
        }

        .control-btn {
            width: 100%;
            margin-top: 16px;
            background: #f1f5f9;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #ff7a00;
            color: white;
        }

        .confirm-section {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ff7a00, #ff9f43);
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 12px;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 122, 0, 0.3);
        }

        .reset-btn {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.08);
            padding: 14px 32px;
            border-radius: 60px;
            color: #4b5563;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        @media (max-width: 680px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ <span>优雅慢速 · 数字滚动效果</span></h1>
            <p>点击卡片预览效果，选择您喜欢的风格应用到 Dashboard</p>
        </div>

        <div class="grid" id="cardsGrid"></div>

        <div class="confirm-section">
            <button class="reset-btn" id="resetBtn">🔄 重置</button>
            <button class="confirm-btn" id="confirmBtn">✅ 应用此效果到 Dashboard</button>
        </div>
    </div>

    <script>
        const targetValues = {
            sales: 12845,
            roi: 24.6,
            orders: 156,
            profit: 2340
        };

        const effects = [
            { id: 1, name: '匀速滚动', desc: '线性递增，均匀变化', icon: '📊', duration: 1500, easing: 'linear' },
            { id: 2, name: '缓入缓出', desc: '慢→快→慢，自然流畅', icon: '🎯', duration: 1500, easing: 'easeInOut' },
            { id: 3, name: '快速加速', desc: '开始慢，快速冲顶', icon: '⚡', duration: 1200, easing: 'easeOut' },
            { id: 4, name: '慢速起步', desc: '开始快，慢慢减速', icon: '🐢', duration: 1800, easing: 'easeIn' },
            { id: 5, name: '弹性效果', desc: '超过目标再回弹', icon: '🔄', duration: 1600, easing: 'bounce' },
            { id: 6, name: '闪烁滚动', desc: '滚动时轻微闪烁', icon: '✨', duration: 1500, easing: 'linear' },
            { id: 7, name: '阶梯跳跃', desc: '分段跳跃式递增', icon: '📈', duration: 1400, easing: 'step' },
            { id: 8, name: '波浪滚动', desc: '波浪式起伏递增', icon: '🌊', duration: 1700, easing: 'wave' },
            { id: 9, name: '脉冲滚动', desc: '带脉冲光效滚动', icon: '💫', duration: 1500, easing: 'linear' },
            { id: 10, name: '优雅慢速', desc: '超慢速，高级感', icon: '🍃', duration: 2000, easing: 'easeInOut' }
        ];

        let selectedEffect = 10;
        let activeAnimations = {};

        const easingFunctions = {
            linear: (t) => t,
            easeInOut: (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
            easeOut: (t) => 1 - Math.pow(1 - t, 3),
            easeIn: (t) => t * t * t,
            bounce: (t) => {
                const n1 = 7.5625;
                const d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            },
            step: (t) => Math.floor(t * 10) / 10,
            wave: (t) => t + Math.sin(t * Math.PI * 2) * 0.05
        };

        function animateNumber(element, start, end, duration, easing, onUpdate) {
            const startTime = performance.now();
            const easingFunc = easingFunctions[easing] || easingFunctions.linear;
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                let progress = Math.min(elapsed / duration, 1);
                
                if (easing === 'step') {
                    progress = easingFunc(progress);
                    const value = start + (end - start) * progress;
                    if (onUpdate) onUpdate(Math.floor(value));
                } else if (easing === 'wave') {
                    progress = easingFunc(progress);
                    const value = start + (end - start) * progress;
                    if (onUpdate) onUpdate(value.toFixed(1));
                } else {
                    const eased = easingFunc(progress);
                    const value = start + (end - start) * eased;
                    if (onUpdate) onUpdate(value.toFixed(1));
                }
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    if (onUpdate) onUpdate(end);
                }
            }
            
            requestAnimationFrame(update);
        }

        function animateWithBlink(element, start, end, duration) {
            let frame = 0;
            const steps = 60;
            const interval = duration / steps;
            let current = start;
            
            const timer = setInterval(() => {
                frame++;
                const progress = frame / steps;
                current = start + (end - start) * progress;
                element.textContent = formatValue(current);
                if (frame % 6 === 0) {
                    element.style.opacity = '0.5';
                    setTimeout(() => { element.style.opacity = '1'; }, 50);
                }
                if (frame >= steps) {
                    clearInterval(timer);
                    element.textContent = formatValue(end);
                    element.style.opacity = '1';
                }
            }, interval);
        }

        function animateWithPulse(element, start, end, duration) {
            let frame = 0;
            const steps = 60;
            const interval = duration / steps;
            let current = start;
            
            const timer = setInterval(() => {
                frame++;
                const progress = frame / steps;
                current = start + (end - start) * progress;
                element.textContent = formatValue(current);
                const scale = 1 + Math.sin(frame * 0.5) * 0.1;
                element.style.transform = `scale(${scale})`;
                element.style.display = 'inline-block';
                if (frame >= steps) {
                    clearInterval(timer);
                    element.textContent = formatValue(end);
                    element.style.transform = 'scale(1)';
                }
            }, interval);
        }

        function animateWithJump(element, start, end, duration) {
            const steps = 20;
            const increment = (end - start) / steps;
            let current = start;
            let step = 0;
            const timer = setInterval(() => {
                step++;
                current += increment;
                if (step >= steps) current = end;
                element.textContent = formatValue(current);
                if (step >= steps) clearInterval(timer);
            }, duration / steps);
        }

        function formatValue(value) {
            if (Math.abs(value) > 999) {
                return '€' + Math.round(value).toLocaleString();
            }
            if (typeof value === 'number' && value % 1 !== 0) {
                return value.toFixed(1) + '%';
            }
            return Math.round(value).toString();
        }

        function startDemo(effectId, card) {
            if (activeAnimations[effectId]) {
                clearInterval(activeAnimations[effectId]);
            }
            
            const salesEl = card.querySelector('.demo-sales');
            const roiEl = card.querySelector('.demo-roi');
            const ordersEl = card.querySelector('.demo-orders');
            const profitEl = card.querySelector('.demo-profit');
            
            const effect = effects.find(e => e.id === effectId);
            
            if (effectId === 6) {
                animateWithBlink(salesEl, 0, targetValues.sales, effect.duration);
                animateWithBlink(roiEl, 0, targetValues.roi, effect.duration);
                animateWithBlink(ordersEl, 0, targetValues.orders, effect.duration);
                animateWithBlink(profitEl, 0, targetValues.profit, effect.duration);
            } else if (effectId === 7) {
                animateWithJump(salesEl, 0, targetValues.sales, effect.duration);
                animateWithJump(roiEl, 0, targetValues.roi, effect.duration);
                animateWithJump(ordersEl, 0, targetValues.orders, effect.duration);
                animateWithJump(profitEl, 0, targetValues.profit, effect.duration);
            } else if (effectId === 9) {
                animateWithPulse(salesEl, 0, targetValues.sales, effect.duration);
                animateWithPulse(roiEl, 0, targetValues.roi, effect.duration);
                animateWithPulse(ordersEl, 0, targetValues.orders, effect.duration);
                animateWithPulse(profitEl, 0, targetValues.profit, effect.duration);
            } else {
                animateNumber(salesEl, 0, targetValues.sales, effect.duration, effect.easing, (val) => {
                    salesEl.textContent = '€' + Math.round(val).toLocaleString();
                });
                animateNumber(roiEl, 0, targetValues.roi, effect.duration, effect.easing, (val) => {
                    roiEl.textContent = val.toFixed(1) + '%';
                });
                animateNumber(ordersEl, 0, targetValues.orders, effect.duration, effect.easing, (val) => {
                    ordersEl.textContent = Math.round(val).toString();
                });
                animateNumber(profitEl, 0, targetValues.profit, effect.duration, effect.easing, (val) => {
                    profitEl.textContent = '€' + Math.round(val).toLocaleString();
                });
            }
        }

        function renderGrid() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            effects.forEach(effect => {
                const card = document.createElement('div');
                card.className = `card ${selectedEffect === effect.id ? 'selected' : ''}`;
                card.dataset.effect = effect.id;
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${effect.icon} ${effect.name}</span>
                        <span class="preview-badge">${effect.duration}ms</span>
                    </div>
                    <div class="number-display">
                        <div><span class="number-value demo-sales">€0</span></div>
                        <div class="number-label">Total Sales</div>
                    </div>
                    <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                        <div style="flex:1">
                            <span class="number-value demo-roi" style="font-size: 24px;">0%</span>
                            <div class="number-label">ROI</div>
                        </div>
                        <div style="flex:1">
                            <span class="number-value demo-orders" style="font-size: 24px;">0</span>
                            <div class="number-label">Orders</div>
                        </div>
                        <div style="flex:1">
                            <span class="number-value demo-profit" style="font-size: 24px;">€0</span>
                            <div class="number-label">Profit</div>
                        </div>
                    </div>
                    <div class="effect-demo">
                        <span>${effect.desc}</span>
                    </div>
                    <button class="control-btn preview-btn">▶ 预览动画</button>
                `;
                
                grid.appendChild(card);
                
                const previewBtn = card.querySelector('.preview-btn');
                previewBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    startDemo(effect.id, card);
                });
                
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('preview-btn')) return;
                    selectEffect(effect.id);
                });
            });
        }

        function selectEffect(effectId) {
            selectedEffect = effectId;
            document.querySelectorAll('.card').forEach(card => {
                const cardEffect = parseInt(card.dataset.effect);
                if (cardEffect === effectId) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
            showToast(`已选择 ${effects.find(e => e.id === effectId)?.name}`);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#ffb84d;padding:10px 20px;border-radius:40px;font-size:13px;z-index:10000;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function resetSelection() {
            selectEffect(10);
        }

        function applyEffect() {
            const effect = effects.find(e => e.id === selectedEffect);
            localStorage.setItem('selected_number_animation', JSON.stringify({
                effectId: selectedEffect,
                effectName: effect.name,
                duration: effect.duration,
                easing: effect.easing
            }));
            showToast(`✅ 已应用「${effect.name}」数字滚动效果！`);
            setTimeout(() => {
                if (confirm('跳转到 Dashboard 查看效果？')) window.location.href = 'start.html';
            }, 500);
        }

        renderGrid();
        document.getElementById('resetBtn').addEventListener('click', resetSelection);
        document.getElementById('confirmBtn').addEventListener('click', applyEffect);
        
        setTimeout(() => {
            const defaultCard = document.querySelector('.card.selected');
            if (defaultCard) startDemo(10, defaultCard);
        }, 500);
    </script>
</body>
</html>
