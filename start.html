<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Trend 图表预览 | 橙色面积图 + 金属柱状图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7a00, #ff9f43);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 14px;
        }

        /* 风格切换器 */
        .style-switcher {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .style-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #475569;
        }

        .style-btn i {
            margin-right: 8px;
        }

        .style-btn.active {
            background: linear-gradient(135deg, #ff7a00, #ff9f43);
            border-color: #ff7a00;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
        }

        .style-btn.active i {
            color: white;
        }

        .style-btn:hover:not(.active) {
            border-color: #ff7a00;
            color: #ff7a00;
        }

        /* 图表卡片 */
        .chart-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eef2f7;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .chart-title i {
            color: #ff7a00;
            margin-right: 8px;
        }

        .chart-stats {
            display: flex;
            gap: 24px;
        }

        .stat-item {
            text-align: right;
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .stat-value.up {
            color: #10b981;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
        }

        canvas {
            max-height: 320px;
            width: 100%;
        }

        /* 数据表格 */
        .data-table {
            margin-top: 24px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
        }

        .data-title {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-day {
            font-weight: 500;
            color: #475569;
        }

        .data-amount {
            font-weight: 600;
            color: #ff7a00;
        }

        /* 确认按钮 */
        .confirm-section {
            margin-top: 32px;
            text-align: center;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ff7a00, #ff9f43);
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 122, 0, 0.4);
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .loading-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #ff7a00;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .chart-container {
                height: 260px;
            }
            .style-btn {
                padding: 8px 20px;
                font-size: 13px;
            }
            .chart-stats {
                gap: 12px;
            }
            .stat-value {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📈 Revenue Trend</h1>
            <p>Commission earnings trend over the last 7 days</p>
        </div>

        <div class="style-switcher">
            <button class="style-btn" id="areaStyleBtn">
                <i class="fas fa-chart-line"></i> 橙色渐变面积图
            </button>
            <button class="style-btn" id="barStyleBtn">
                <i class="fas fa-chart-bar"></i> 活力橙金属柱状图
            </button>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">
                    <i class="fas fa-chart-simple"></i> Commission Trend
                </div>
                <div class="chart-stats">
                    <div class="stat-item">
                        <div class="stat-label">Total Commission</div>
                        <div class="stat-value" id="totalCommission">€0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Avg. Daily</div>
                        <div class="stat-value" id="avgCommission">€0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Trend</div>
                        <div class="stat-value up" id="trendValue">+0%</div>
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="data-table">
                <div class="data-title">
                    <i class="fas fa-calendar-week"></i> Last 7 Days Data
                </div>
                <div id="dataRows"></div>
            </div>
        </div>

        <div class="confirm-section">
            <button class="confirm-btn" id="confirmBtn">
                ✅ 确认选择此风格并应用到 Dashboard
            </button>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentChart = null;
        let currentStyle = 'area'; // 'area' 或 'bar'
        let commissionData = [0, 0, 0, 0, 0, 0, 0];
        let dates = [];

        // 显示/隐藏加载动画
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
            } else {
                overlay.classList.remove('show');
            }
        }

        // 获取真实用户数据
        async function fetchUserCommissionData() {
            const user = getCurrentUser();
            if (!user) return null;

            try {
                // 获取最近7天的日期范围
                const dates7 = [];
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(today.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    dates7.push({
                        label: `${date.getMonth() + 1}/${date.getDate()}`,
                        date: date,
                        dateStr: dateStr,
                        start: new Date(date.setHours(0, 0, 0, 0)).toISOString(),
                        end: new Date(date.setHours(23, 59, 59, 999)).toISOString()
                    });
                }
                
                // 修正第二个日期对象
                for (let i = 0; i < dates7.length; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() - (6 - i));
                    d.setHours(0, 0, 0, 0);
                    dates7[i].start = d.toISOString();
                    const endD = new Date(d);
                    endD.setHours(23, 59, 59, 999);
                    dates7[i].end = endD.toISOString();
                    dates7[i].label = `${d.getMonth() + 1}/${d.getDate()}`;
                }
                
                dates = dates7.map(d => d.label);
                
                // 获取所有订单
                const { data: orders, error } = await sb
                    .from('order_history')
                    .select('commission, date')
                    .eq('uid', user.uid.toString());
                
                if (error) throw error;
                
                // 按天计算Commission
                const dailyData = [0, 0, 0, 0, 0, 0, 0];
                
                if (orders && orders.length > 0) {
                    for (const order of orders) {
                        if (!order.date) continue;
                        const orderDate = new Date(order.date);
                        orderDate.setHours(0, 0, 0, 0);
                        const orderDateStr = orderDate.toISOString().split('T')[0];
                        
                        for (let i = 0; i < dates7.length; i++) {
                            const d = new Date(dates7[i].start);
                            d.setHours(0, 0, 0, 0);
                            const dateStr = d.toISOString().split('T')[0];
                            if (orderDateStr === dateStr) {
                                dailyData[i] += (order.commission || 0);
                                break;
                            }
                        }
                    }
                }
                
                // 如果没有真实数据，使用模拟数据展示效果
                const hasData = dailyData.some(v => v > 0);
                if (!hasData) {
                    // 模拟数据用于预览
                    commissionData = [42, 58, 35, 72, 68, 89, 95];
                } else {
                    commissionData = dailyData;
                }
                
                return commissionData;
                
            } catch (err) {
                console.error('获取Commission数据失败:', err);
                // 使用模拟数据
                commissionData = [42, 58, 35, 72, 68, 89, 95];
                return commissionData;
            }
        }

        // 获取当前用户
        function getCurrentUser() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return null;
            try {
                return JSON.parse(userStr);
            } catch(e) {
                return null;
            }
        }

        // 更新统计数据
        function updateStats(data) {
            const total = data.reduce((sum, v) => sum + v, 0);
            const avg = total / data.length;
            const lastDay = data[data.length - 1];
            const prevDay = data[data.length - 2] || lastDay;
            const trend = prevDay === 0 ? 100 : ((lastDay - prevDay) / prevDay * 100).toFixed(1);
            
            document.getElementById('totalCommission').innerHTML = `€${total.toFixed(2)}`;
            document.getElementById('avgCommission').innerHTML = `€${avg.toFixed(2)}`;
            document.getElementById('trendValue').innerHTML = `${trend >= 0 ? '+' : ''}${trend}%`;
            
            // 更新数据表格
            const container = document.getElementById('dataRows');
            if (container) {
                container.innerHTML = dates.map((date, idx) => `
                    <div class="data-row">
                        <span class="data-day">${date}</span>
                        <span class="data-amount">€${data[idx].toFixed(2)}</span>
                    </div>
                `).join('');
            }
        }

        // 创建橙色渐变面积图
        function createAreaChart(ctx, data) {
            const gradient = ctx.createLinearGradient(0, 0, 0, 320);
            gradient.addColorStop(0, 'rgba(255, 122, 0, 0.35)');
            gradient.addColorStop(0.5, 'rgba(255, 122, 0, 0.15)');
            gradient.addColorStop(1, 'rgba(255, 122, 0, 0.02)');
            
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Commission (€)',
                        data: data,
                        borderColor: '#ff7a00',
                        borderWidth: 3,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#ff7a00',
                        pointBorderColor: 'white',
                        pointBorderWidth: 2,
                        pointHitRadius: 10,
                        smooth: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: {
                        duration: 800,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#ff9f43',
                            bodyColor: 'white',
                            borderColor: '#ff7a00',
                            borderWidth: 1,
                            callbacks: {
                                label: (context) => `Commission: €${context.raw.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { 
                                font: { size: 11, weight: '500' },
                                color: '#64748b'
                            }
                        },
                        y: {
                            grid: { 
                                color: '#e2e8f0',
                                drawBorder: false
                            },
                            ticks: {
                                callback: (value) => '€' + value,
                                font: { size: 10 },
                                color: '#94a3b8'
                            },
                            beginAtZero: true
                        }
                    },
                    elements: {
                        line: {
                            borderJoin: 'round',
                            borderCap: 'round'
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    }
                }
            });
        }

        // 创建活力橙金属质感柱状图
        function createBarChart(ctx, data) {
            // 创建金属质感渐变
            const barColors = data.map((value, index) => {
                const gradient = ctx.createLinearGradient(0, 0, 0, 320);
                const intensity = 0.6 + (value / Math.max(...data, 1)) * 0.3;
                gradient.addColorStop(0, `rgba(255, 122, 0, ${intensity + 0.1})`);
                gradient.addColorStop(0.5, `rgba(255, 100, 0, ${intensity})`);
                gradient.addColorStop(1, `rgba(230, 80, 0, ${intensity + 0.05})`);
                return gradient;
            });
            
            return new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Commission (€)',
                        data: data,
                        backgroundColor: barColors,
                        borderRadius: 8,
                        borderSkipped: false,
                        barPercentage: 0.7,
                        categoryPercentage: 0.85,
                        hoverBackgroundColor: '#ff7a00',
                        hoverBorderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: {
                        duration: 800,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            titleColor: '#ff9f43',
                            bodyColor: 'white',
                            borderColor: '#ff7a00',
                            borderWidth: 1,
                            callbacks: {
                                label: (context) => `Commission: €${context.raw.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { 
                                font: { size: 11, weight: '500' },
                                color: '#64748b'
                            }
                        },
                        y: {
                            grid: { 
                                color: '#e2e8f0',
                                drawBorder: false
                            },
                            ticks: {
                                callback: (value) => '€' + value,
                                font: { size: 10 },
                                color: '#94a3b8'
                            },
                            beginAtZero: true
                        }
                    },
                    layout: {
                        padding: {
                            top: 10,
                            bottom: 5
                        }
                    }
                }
            });
        }

        // 销毁现有图表
        function destroyChart() {
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }
        }

        // 渲染图表
        async function renderChart(style) {
            showLoading(true);
            destroyChart();
            
            // 获取最新数据
            await fetchUserCommissionData();
            updateStats(commissionData);
            
            const canvas = document.getElementById('revenueChart');
            const ctx = canvas.getContext('2d');
            
            // 使用 requestAnimationFrame 确保 DOM 更新完成后再创建图表
            requestAnimationFrame(() => {
                if (style === 'area') {
                    currentChart = createAreaChart(ctx, commissionData);
                } else {
                    currentChart = createBarChart(ctx, commissionData);
                }
                showLoading(false);
            });
        }

        // 切换风格
        function switchStyle(style) {
            currentStyle = style;
            
            // 更新按钮样式
            const areaBtn = document.getElementById('areaStyleBtn');
            const barBtn = document.getElementById('barStyleBtn');
            
            if (style === 'area') {
                areaBtn.classList.add('active');
                barBtn.classList.remove('active');
            } else {
                barBtn.classList.add('active');
                areaBtn.classList.remove('active');
            }
            
            // 重新渲染图表
            renderChart(style);
        }

        // 确认选择并保存
        function confirmSelection() {
            const selectedStyle = currentStyle === 'area' ? 'area' : 'bar';
            const styleName = currentStyle === 'area' ? '橙色渐变面积图' : '活力橙金属柱状图';
            
            // 保存到 localStorage
            const styleConfig = {
                type: currentStyle,
                name: styleName,
                createdAt: new Date().toISOString()
            };
            localStorage.setItem('selected_chart_style', JSON.stringify(styleConfig));
            
            // 显示成功提示
            showToast(`✅ 已选择「${styleName}」风格！`, 'success');
            
            // 可选：跳转回 dashboard
            setTimeout(() => {
                if (confirm('风格已保存！是否现在跳转到 Dashboard 查看效果？')) {
                    window.location.href = 'start.html';
                }
            }, 500);
        }

        // 自定义 Toast
        function showToast(message, type) {
            const existingToast = document.querySelector('.custom-toast-preview');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'custom-toast-preview';
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}" style="color: #ff7a00;"></i>
                <span>${message}</span>
            `;
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: #1a1a2e;
                color: white;
                padding: 12px 24px;
                border-radius: 60px;
                font-size: 14px;
                z-index: 10000;
                display: flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.2);
                animation: fadeInUp 0.3s ease forwards;
            `;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInUp {
                    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
                    to { opacity: 1; transform: translateX(-50%) translateY(0); }
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // 初始化
        async function init() {
            // 绑定事件
            document.getElementById('areaStyleBtn').addEventListener('click', () => switchStyle('area'));
            document.getElementById('barStyleBtn').addEventListener('click', () => switchStyle('bar'));
            document.getElementById('confirmBtn').addEventListener('click', confirmSelection);
            
            // 加载数据并默认显示面积图
            await fetchUserCommissionData();
            
            // 检查是否有保存的风格
            const savedStyle = localStorage.getItem('selected_chart_style');
            if (savedStyle) {
                try {
                    const config = JSON.parse(savedStyle);
                    if (config.type === 'bar') {
                        switchStyle('bar');
                    } else {
                        switchStyle('area');
                    }
                } catch(e) {
                    switchStyle('area');
                }
            } else {
                switchStyle('area');
            }
        }
        
        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
