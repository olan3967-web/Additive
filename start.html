<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1f2937;
            display: flex;
            justify-content: center;
        }

        /* 手机容器 - 无左右padding */
        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding: 0;
            padding-bottom: 80px;
            position: relative;
        }

        /* 页面头部 - 有左右边距 */
        .dashboard-header {
            padding: 20px 20px 0;
        }

        .welcome-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .welcome-name {
            color: #ff7a00;
        }

        .notification-icon {
            width: 44px;
            height: 44px;
            background: #fff3e8;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .notification-icon i {
            color: #ff7a00;
            font-size: 20px;
        }

        /* 视频卡片 - 全宽无缝隙 */
.video-card {
    width: calc(100% + 40px);
    margin-left: -20px;
    margin-right: -20px;
    margin-top: 0;
    margin-bottom: 0;
    padding: 0;
    position: relative;
    background: #f5f7fb;
    overflow: hidden;
    line-height: 0;
}

.video-card video {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
}

        /* 统计卡片网格 - 有左右边距 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 20px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #eef2f7;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .trend-up {
            color: #10b981;
            font-size: 11px;
        }

        .trend-down {
            color: #ef4444;
            font-size: 11px;
        }

        /* 图表卡片 - 有左右边距 */
        .chart-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            margin: 0 20px 20px;
            border: 1px solid #eef2f7;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chart-title {
            font-weight: 600;
            color: #1a1a2e;
        }

        .chart-period {
            font-size: 11px;
            color: #ff7a00;
        }

        canvas {
            width: 100%;
            height: 140px;
        }

        /* 热门产品卡片 - 有左右边距 */
        .products-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            margin: 0 20px 20px;
            border: 1px solid #eef2f7;
        }

        .products-title {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .product-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f7;
        }

        .product-row:last-child {
            border-bottom: none;
        }

        .product-name {
            font-size: 14px;
            color: #4b5563;
        }

        .product-amount {
            font-weight: 600;
            color: #ff7a00;
        }

        /* 底部导航栏 - 全宽无缝隙 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }

        /* 手机适配 */
        @media (max-width: 390px) {
            .phone {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="phone">

    <!-- 页面头部 -->
    <div class="dashboard-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div class="welcome-text">Welcome back,<br><span class="welcome-name" id="displayUsername">Loading...</span> <span>👋</span></div>
            </div>
            <div class="notification-icon" onclick="location.href='chat.html'">
                <i class="fa-regular fa-bell"></i>
            </div>
        </div>
    </div>

    <!-- 视频卡片 - 全宽无缝隙 -->
    <div class="video-card" id="videoContainer">
        <video id="heroVideo" autoplay loop muted playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

    <!-- KPI 指标 4个 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Sales</div>
            <div class="stat-value" id="totalSales">€0</div>
            <div class="trend-up"><i class="fas fa-arrow-up"></i> +12.5%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ROI</div>
            <div class="stat-value" id="roiValue">0%</div>
            <div class="trend-up"><i class="fas fa-arrow-up"></i> +5.1%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Orders</div>
            <div class="stat-value" id="ordersCount">0</div>
            <div class="trend-up"><i class="fas fa-arrow-up"></i> +8.3%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Profit</div>
            <div class="stat-value" id="profitValue">€0</div>
            <div class="trend-up"><i class="fas fa-arrow-up"></i> +15.2%</div>
        </div>
    </div>

    <!-- 趋势图表 -->
    <div class="chart-card">
        <div class="chart-header">
            <span class="chart-title">Revenue Trend</span>
            <span class="chart-period">Last 7 days</span>
        </div>
        <canvas id="revenueChart"></canvas>
    </div>

    <!-- 热门产品 -->
    <div class="products-card">
        <div class="products-title">🔥 Top Products</div>
        <div class="product-row">
            <span class="product-name">Wireless Earbuds</span>
            <span class="product-amount">€2,340</span>
        </div>
        <div class="product-row">
            <span class="product-name">Smart Watch Pro</span>
            <span class="product-amount">€1,890</span>
        </div>
        <div class="product-row">
            <span class="product-name">Portable Speaker</span>
            <span class="product-amount">€1,245</span>
        </div>
    </div>

    <!-- 底部固定菜单栏 - 全宽无缝隙 -->
    <div class="bottom-nav">
        <div class="nav-item active" data-page="dashboard">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="products">
            <i class="fa-solid fa-box"></i>
            <span>Products</span>
        </div>
        <div class="nav-item" data-page="orders">
            <i class="fa-solid fa-list-check"></i>
            <span>Orders</span>
        </div>
        <div class="nav-item" data-page="profile">
            <i class="fa-solid fa-user"></i>
            <span>My Profile</span>
        </div>
    </div>

</div>

<script>
    // Supabase 配置
    const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let revenueChart = null;

    // ========== 辅助函数 ==========
    function getCurrentUser() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) return null;
        try {
            return JSON.parse(userStr);
        } catch(e) { return null; }
    }

    function checkLogin() {
        const user = getCurrentUser();
        if (!user || !user.isLoggedIn) {
            window.location.href = 'signin.html';
            return null;
        }
        return user;
    }

    // ========== 加载视频配置 ==========
    async function loadVideoConfig() {
        try {
            const { data, error } = await sb
                .from('animated_settings')
                .select('video_url')
                .eq('id', 1)
                .single();
            
            if (error) {
                console.error('加载视频配置失败:', error);
                return;
            }
            
            if (data && data.video_url) {
                const video = document.getElementById('heroVideo');
                if (video) {
                    video.src = data.video_url;
                    video.load();
                    video.play().catch(e => console.log('视频自动播放被阻止:', e));
                    console.log('视频加载成功:', data.video_url);
                }
            } else {
                console.log('没有找到视频URL');
            }
        } catch (e) {
            console.error('加载视频失败:', e);
        }
    }

    // ========== 加载用户数据 ==========
    async function loadUserData() {
        const user = checkLogin();
        if (!user) return;

        document.getElementById('displayUsername').innerText = user.username || 'User';

        const { data: orders } = await sb
            .from('order_history')
            .select('commission, price')
            .eq('uid', user.uid);

        const orderCount = orders?.length || 0;
        const totalCommission = orders?.reduce((sum, o) => sum + (o.commission || 0), 0) || 0;
        const totalSales = orders?.reduce((sum, o) => sum + (o.price || 0), 0) || 0;
        
        const roi = totalSales > 0 ? ((totalCommission / totalSales) * 100).toFixed(1) : 0;
        const profit = (totalCommission * 0.7).toFixed(0);

        document.getElementById('totalSales').innerHTML = '€' + totalSales.toLocaleString();
        document.getElementById('roiValue').innerHTML = roi + '%';
        document.getElementById('ordersCount').innerHTML = orderCount;
        document.getElementById('profitValue').innerHTML = '€' + parseFloat(profit).toLocaleString();
    }

    // ========== 初始化图表 ==========
    function initChart() {
        const canvas = document.getElementById('revenueChart');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        
        if (revenueChart) {
            revenueChart.destroy();
        }
        
        revenueChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    data: [3200, 4100, 3800, 5200, 6100, 5800, 7200],
                    borderColor: '#ff7a00',
                    backgroundColor: 'rgba(255,122,0,0.05)',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: '#ff7a00',
                    pointBorderColor: 'white',
                    pointBorderWidth: 1,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    tooltip: { 
                        backgroundColor: 'white',
                        titleColor: '#1a1a2e',
                        bodyColor: '#6b7280',
                        borderColor: '#ff7a00',
                        borderWidth: 1,
                        callbacks: {
                            label: function(context) {
                                return '€' + context.raw.toLocaleString();
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#9ca3af', font: { size: 10 } }
                    },
                    y: { 
                        grid: { color: '#eef2f7', drawBorder: false },
                        ticks: { 
                            color: '#9ca3af', 
                            font: { size: 10 },
                            callback: function(value) {
                                return '€' + value;
                            }
                        }
                    }
                }
            }
        });
    }

    // ========== 底部导航 ==========
    function setupBottomNav() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page === 'dashboard') {
                    window.location.href = 'start.html';
                } else if (page === 'products') {
                    window.location.href = 'start.html';
                } else if (page === 'orders') {
                    window.location.href = 'history.html';
                } else if (page === 'profile') {
                    window.location.href = 'dashboard.html';
                }
            });
        });
    }

    // ========== 初始化 ==========
    async function init() {
        await loadVideoConfig();
        await loadUserData();
        initChart();
        setupBottomNav();
    }

    init();
</script>
</body>
</html>
