<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - ADDITIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a 0%, #0f0a2a 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: rgba(20, 30, 55, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 420px;
            border: 1px solid rgba(140, 163, 255, 0.3);
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 32px;
        }
        .logo span { color: #8ca3ff; }
        .logo small { font-size: 12px; color: #5a6388; }
        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a8c0;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #8ca3ff; }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #2f3e7a, #1f2a50);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn:hover { transform: scale(1.02); background: linear-gradient(135deg, #3e5090, #2a3768); }
        .error-message {
            text-align: center;
            margin-top: 16px;
            color: #ff8888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">ADDITIVE<span>®</span><small> ADMIN</small></div>
        <div class="form-group">
            <label>Admin Password</label>
            <input type="password" id="adminPassword" placeholder="Enter admin password">
        </div>
        <button class="login-btn" onclick="login()">Login to Admin Panel</button>
        <div id="errorMsg" class="error-message"></div>
    </div>

    <script>
        // ⚠️ 请修改为强密码！
        const ADMIN_PASSWORD = 'addmin123456';
        
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'ad.html';
            } else {
                document.getElementById('errorMsg').innerText = 'Invalid password';
            }
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
