<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 波浪背景 - 深橙色 */
        .waves-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 顶部导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            z-index: 100;
            background: transparent;
        }

        .logo-link {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .logo-img {
            height: 32px;
            width: auto;
            display: block;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            font-family: 'Times New Roman', Times, serif;
        }

        .logo-text span {
            color: #f97316;
        }

        .register-container {
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
            margin-top: 40px;
        }

        .register-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px 28px 32px;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #f0f0f0;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 12px;
            font-weight: 500;
        }

        .form-group label i {
            margin-right: 6px;
            color: #f97316;
            font-size: 12px;
        }

        .form-group input {
            width: 100%;
            background: #f8f9fa;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 10px 14px;
            color: #1a1a2e;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .code-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .code-row input {
            flex: 2;
        }

        .send-code-btn {
            flex: 1;
            background: #f97316;
            border: none;
            border-radius: 12px;
            padding: 10px 12px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .send-code-btn:hover:not(:disabled) {
            background: #ea580c;
        }

        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .register-btn {
            width: 100%;
            background: #f97316;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .register-btn:hover {
            background: #ea580c;
            transform: scale(1.01);
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: #888;
        }

        .login-link a {
            color: #f97316;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
            min-height: 36px;
        }

        .success-message {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
            color: #2ed15a;
        }

        /* 手机适配 */
        @media (max-width: 480px) {
            .top-nav {
                padding: 12px 20px;
            }
            .logo-img {
                height: 28px;
            }
            .logo-text {
                font-size: 18px;
            }
            .register-card {
                padding: 22px 20px 28px;
            }
            .subtitle {
                margin-bottom: 20px;
                font-size: 12px;
            }
            .form-group input {
                padding: 8px 12px;
            }
            .send-code-btn {
                padding: 8px 10px;
                font-size: 11px;
            }
            .register-btn {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="wavesBg" class="waves-bg"></canvas>

    <!-- 顶部 Logo - 左上方 -->
    <div class="top-nav">
        <a href="index.html" class="logo-link" id="logoLink">
            <!-- 默认文字 logo，JS 会尝试替换为图片 -->
            <span class="logo-text">CJD<span> | ADDITIVE</span></span>
        </a>
    </div>

    <div class="register-container">
        <div class="register-card">
            <div class="subtitle">Create your account</div>
            
            <!-- 手机号 -->
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <input type="tel" id="regPhone" placeholder="Enter your phone number">
            </div>
            
            <!-- 用户名 -->
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="regUsername" placeholder="Username (min 3 chars)">
            </div>
            
            <!-- 密码 -->
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="regPassword" placeholder="Password (min 4 chars)">
            </div>
            
            <!-- 邀请码（可选） -->
            <div class="form-group">
                <label><i class="fas fa-qrcode"></i> Invitation Code (optional)</label>
                <input type="text" id="regInviteCode" placeholder="Enter invite code">
            </div>
            
            <!-- 邮箱 + 验证码 -->
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <div class="code-row">
                    <input type="email" id="regEmail" placeholder="Enter your email">
                    <button class="send-code-btn" id="sendCodeBtn" onclick="sendEmailToBackend()">Send</button>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-key"></i> Verification Code</label>
                <input type="text" id="regCode" placeholder="Enter 6-digit code from email">
            </div>
            
            <button class="register-btn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div class="login-link">Already have an account? <a href="signin.html">Sign in</a></div>
            <div id="registerError" class="error-message"></div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let countdown = 0;
        let countdownInterval = null;
        let pendingEmail = null;
        
        function showMessage(msg, isError = true) {
            const d = document.getElementById('registerError');
            d.innerText = msg;
            d.className = isError ? 'error-message' : 'success-message';
            setTimeout(() => { if (d.innerText === msg) d.innerText = ''; }, 4000);
        }
        
        // 加载 Logo - 使用您指定的图片URL
        async function loadLogo() {
            const logoUrl = 'https://ygeawapbjcfytjoxpttk.supabase.co/storage/v1/object/public/logos/cj.png';
            const logoLink = document.getElementById('logoLink');
            if (logoLink) {
                // 创建一个图片元素并尝试加载
                const img = document.createElement('img');
                img.src = logoUrl;
                img.alt = 'Logo';
                img.className = 'logo-img';
                img.onload = () => {
                    // 加载成功，替换为图片
                    logoLink.innerHTML = '';
                    logoLink.appendChild(img);
                };
                img.onerror = () => {
                    // 加载失败，保留原有的文字Logo
                    console.log('图片Logo加载失败，使用文字Logo');
                };
            }
        }
        
        // 发送邮箱到后台
        async function sendEmailToBackend() {
            const email = document.getElementById('regEmail').value.trim();
            
            if (!email) {
                showMessage('请输入邮箱地址');
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('请输入有效的邮箱地址');
                return;
            }
            
            if (countdown > 0) {
                showMessage(`请等待 ${countdown} 秒后再试`);
                return;
            }
            
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
            
            try {
                // 检查邮箱是否已被注册
                const { data: existingEmail, error: checkError } = await sb
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();
                
                if (checkError) {
                    console.error('检查邮箱失败:', checkError);
                }
                
                if (existingEmail) {
                    showMessage('邮箱已被注册');
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                    return;
                }
                
                // 删除该邮箱旧的待验证记录
                const { error: deleteError } = await sb
                    .from('email_verification_requests')
                    .delete()
                    .eq('email', email)
                    .eq('is_verified', false);
                
                if (deleteError) {
                    console.error('删除旧记录失败:', deleteError);
                }
                
                // 计算过期时间（24小时后）
                const expiresAt = new Date();
                expiresAt.setHours(expiresAt.getHours() + 24);
                
                // 创建新的邮箱验证请求
                const { data: insertData, error: insertError } = await sb
                    .from('email_verification_requests')
                    .insert({
                        email: email,
                        code: null,
                        is_verified: false,
                        requested_at: new Date().toISOString(),
                        expires_at: expiresAt.toISOString()
                    })
                    .select();
                
                if (insertError) {
                    console.error('存储失败:', insertError);
                    showMessage('发送失败: ' + insertError.message);
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                    return;
                }
                
                console.log('邮箱提交成功:', insertData);
                pendingEmail = email;
                showMessage('邮箱已提交！请等待管理员发送验证码到您的邮箱', false);
                
                startCountdown(60);
                
            } catch (err) {
                console.error('错误:', err);
                showMessage('网络错误，请重试: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Send';
            }
        }
        
        function startCountdown(seconds) {
            countdown = seconds;
            const btn = document.getElementById('sendCodeBtn');
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                } else {
                    btn.innerHTML = `${countdown}s`;
                }
            }, 1000);
        }
        
        function generateInviteCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        async function handleRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const verifyCode = document.getElementById('regCode').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('regInviteCode').value.trim();
            
            // 验证输入
            if (!email) { showMessage('请输入邮箱地址'); return; }
            if (!verifyCode || verifyCode.length !== 6) { showMessage('请输入6位验证码'); return; }
            if (!phone) { showMessage('请输入手机号'); return; }
            if (!username || username.length < 3) { showMessage('用户名至少3个字符'); return; }
            if (!password || password.length < 4) { showMessage('密码至少4个字符'); return; }
            
            showMessage('验证中...', false);
            
            try {
                // 1. 验证邮箱验证码
                const { data: requestData, error: requestError } = await sb
                    .from('email_verification_requests')
                    .select('*')
                    .eq('email', email)
                    .eq('code', verifyCode)
                    .eq('is_verified', false)
                    .gt('expires_at', new Date().toISOString())
                    .maybeSingle();
                
                if (requestError || !requestData) {
                    showMessage('验证码错误或已过期，请联系管理员获取正确的验证码');
                    return;
                }
                
                showMessage('创建账号中...', false);
                
                // 2. 检查用户名是否已存在
                const { data: existingUser } = await sb
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();
                
                if (existingUser) { 
                    showMessage('用户名已存在'); 
                    return; 
                }
                
                // 3. 检查邮箱是否已存在
                const { data: existingEmail } = await sb
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();
                
                if (existingEmail) { 
                    showMessage('邮箱已被注册'); 
                    return; 
                }
                
                // 4. 获取最大 UID
                const { data: maxUidData } = await sb
                    .from('users')
                    .select('uid')
                    .order('uid', { ascending: false })
                    .limit(1);
                
                let newUid = '100001';
                if (maxUidData && maxUidData.length > 0 && maxUidData[0].uid) {
                    newUid = (parseInt(maxUidData[0].uid) + 1).toString();
                }
                
                // 5. 处理邀请码
                let invitedBy = '';
                let invitedByUsername = '';
                
                if (inviteCode) {
                    const { data: inviter } = await sb
                        .from('users')
                        .select('uid, username, balance')
                        .eq('invite_code', inviteCode)
                        .maybeSingle();
                    
                    if (inviter) {
                        invitedBy = inviter.uid;
                        invitedByUsername = inviter.username;
                        
                        const newBalance = (inviter.balance || 0) + 10;
                        await sb.from('users').update({ balance: newBalance }).eq('uid', inviter.uid);
                        await sb.from('deposits').insert([{ 
                            uid: inviter.uid, 
                            username: inviter.username, 
                            amount: 10, 
                            type: 'referral_bonus',
                            created_at: new Date().toISOString()
                        }]);
                        showMessage('邀请码有效！推荐人获得 €10', false);
                    } else {
                        showMessage('邀请码无效，继续注册', false);
                    }
                }
                
                // 6. 生成新用户的邀请码
                const newInviteCode = generateInviteCode();
                
                // 7. 创建新用户
                const { error: insertError } = await sb
                    .from('users')
                    .insert([{
                        uid: newUid,
                        email: email,
                        phone: phone,
                        username: username,
                        password: password,
                        balance: 0,
                        trial_bonus_amount: 0,
                        vip_level: 1,
                        invite_code: newInviteCode,
                        invited_by: invitedBy,
                        invited_by_username: invitedByUsername,
                        total_orders: 0,
                        is_active: true,
                        created_at: new Date().toISOString()
                    }]);
                
                if (insertError) {
                    console.error('Insert error:', insertError);
                    showMessage('注册失败: ' + insertError.message);
                    return;
                }
                
                // 8. 标记验证码为已使用
                await sb
                    .from('email_verification_requests')
                    .update({ is_verified: true, verified_at: new Date().toISOString() })
                    .eq('email', email)
                    .eq('code', verifyCode);
                
                // 9. 保存登录状态
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: newUid,
                    username: username,
                    email: email,
                    balance: 0,
                    trialBonusAmount: 0,
                    commissionRate: 0.51,
                    vipLevel: 1,
                    inviteCode: newInviteCode,
                    isLoggedIn: true,
                    loginTime: Date.now()
                }));
                
                showMessage('注册成功！正在跳转...', false);
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                
            } catch (err) {
                console.error('Registration error:', err);
                showMessage('错误: ' + err.message);
            }
        }
        
        // 检查是否已登录
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user.isLoggedIn) window.location.href = 'dashboard.html';
            } catch(e) {}
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleRegister();
        });
        
        // 加载 logo（使用您指定的URL）
        loadLogo();
    </script>

    <!-- 波浪效果 - 深橙色 -->
    <script>
    (function() {
        const canvas = document.getElementById('wavesBg');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height;
        let time = 0;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function animate() {
            time += 0.02;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            
            for(let i = 0; i < 3; i++) {
                ctx.beginPath();
                for(let x = 0; x <= width; x += 10) {
                    const y = height * (0.4 + i * 0.2) + Math.sin(x * 0.01 + time * (1 + i * 0.5)) * 25 + Math.cos(x * 0.02 + time) * 12;
                    if(x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                // 加深波浪颜色
                ctx.strokeStyle = `rgba(249, 115, 22, ${0.25 - i * 0.06})`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
            
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
