<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Register</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .register-container { width: 100%; padding: 20px; position: relative; z-index: 1; }
        .register-card {
            background: rgba(20,25,50,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 42px 40px;
            max-width: 480px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .logo { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 8px; color: #fff; }
        .logo span { color: #8ca3ff; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-size: 13px; }
        .form-group label i { margin-right: 8px; color: #8ca3ff; }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #8ca3ff; box-shadow: 0 0 0 3px rgba(140,163,255,0.15); }
        .register-btn {
            width: 100%;
            background: linear-gradient(135deg, #2f3e7a, #1f2a50);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            transition: 0.2s;
        }
        .register-btn:hover { transform: scale(1.02); background: linear-gradient(135deg, #3e5090, #2a3768); }
        .login-link { text-align: center; margin-top: 24px; font-size: 13px; color: #aaa; }
        .login-link a { color: #8ca3ff; text-decoration: none; }
        .error-message { text-align: center; margin-top: 16px; font-size: 13px; min-height: 40px; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">ADDITIVE<span>®</span></div>
            <div class="subtitle">Create your account</div>
            <div class="form-group"><label><i class="fas fa-user"></i> Username</label><input type="text" id="regUsername" placeholder="Username (min 3 chars)"></div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="regPassword" placeholder="Password (min 4 chars)"></div>
            <div class="form-group"><label><i class="fas fa-qrcode"></i> Invitation Code (optional)</label><input type="text" id="regInviteCode" placeholder="Enter invite code"></div>
            <div class="form-group"><label><i class="fas fa-wallet"></i> Withdrawal PIN (4 digits)</label><input type="password" id="regPin" maxlength="4" placeholder="4-digit PIN"></div>
            <button class="register-btn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div class="login-link">Already have an account? <a href="signin.html">Sign in</a></div>
            <div id="registerError" class="error-message"></div>
        </div>
    </div>

    <script>
        // 生成顺序 UID (100001, 100002, 100003...)
        function generateUID() {
            let members = JSON.parse(localStorage.getItem('additive_members') || '[]');
            if (members.length === 0) {
                return '100001';
            }
            let maxUID = 100000;
            members.forEach(m => {
                let num = parseInt(m.uid);
                if (num > maxUID) maxUID = num;
            });
            return (maxUID + 1).toString();
        }
        
        // 生成6位随机邀请码（大写字母+数字）
        function generateInviteCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        function showMessage(msg, isError=true){
            const d=document.getElementById('registerError');
            d.innerText=msg;
            d.style.color=isError?'#ff8080':'#4ade80';
            setTimeout(()=>{if(d.innerText===msg) d.innerText='';},3000);
        }
        
        function handleRegister(){
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('regInviteCode').value.trim();
            const pin = document.getElementById('regPin').value;
            
            if(!username || username.length<3){ showMessage('Username must be at least 3 characters'); return; }
            if(!password || password.length<4){ showMessage('Password must be at least 4 characters'); return; }
            if(!pin || pin.length!==4 || isNaN(pin)){ showMessage('Withdrawal PIN must be 4 digits'); return; }
            
            let members = JSON.parse(localStorage.getItem('additive_members') || '[]');
            if(members.find(m=>m.username===username)){ showMessage('Username already exists'); return; }
            
            let invitedBy = '';
            let invitedByUsername = '';
            
            if(inviteCode){
                const inviter = members.find(m => m.inviteCode === inviteCode);
                if(inviter){
                    invitedBy = inviter.uid;
                    invitedByUsername = inviter.username;
                    inviter.balance = (inviter.balance || 0) + 10;
                    
                    let deposits = JSON.parse(localStorage.getItem('additive_deposits') || '[]');
                    deposits.push({ id: deposits.length+1, uid: inviter.uid, username: inviter.username, amount: 10, date: new Date().toISOString(), type: 'referral_bonus' });
                    localStorage.setItem('additive_deposits', JSON.stringify(deposits));
                    
                    let codes = JSON.parse(localStorage.getItem('additive_invitationCodes') || '[]');
                    const ce = codes.find(c => c.code === inviteCode);
                    if(ce) ce.usedCount = (ce.usedCount || 0) + 1;
                    else codes.push({ code: inviteCode, ownerUid: inviter.uid, ownerUsername: inviter.username, usedCount: 1, rewardPerSignup: 10 });
                    localStorage.setItem('additive_invitationCodes', JSON.stringify(codes));
                    showMessage('Invitation code accepted!', false);
                } else {
                    showMessage('Invitation code not found', false);
                }
            }
            
            localStorage.setItem('additive_members', JSON.stringify(members));
            
            const newUID = generateUID();
            const newInviteCode = generateInviteCode();
            
            const newMember = {
                uid: newUID,
                username: username,
                password: password,
                pin: pin,
                balance: 0,
                commissionRate: 5,
                vipLevel: 1,
                inviteCode: newInviteCode,
                invitedBy: invitedBy,
                invitedByUsername: invitedByUsername,
                totalOrders: 0,
                createdAt: new Date().toISOString(),
                isActive: true
            };
            
            members.push(newMember);
            localStorage.setItem('additive_members', JSON.stringify(members));
            
            // 添加邀请码记录
            let codes = JSON.parse(localStorage.getItem('additive_invitationCodes') || '[]');
            if(!codes.find(c => c.code === newInviteCode)){
                codes.push({ code: newInviteCode, ownerUid: newUID, ownerUsername: username, usedCount: 0, rewardPerSignup: 10 });
                localStorage.setItem('additive_invitationCodes', JSON.stringify(codes));
            }
            
            let deposits = JSON.parse(localStorage.getItem('additive_deposits') || '[]');
            deposits.push({ id: deposits.length+1, uid: newUID, username: username, amount: 0, date: new Date().toISOString(), type: 'registration' });
            localStorage.setItem('additive_deposits', JSON.stringify(deposits));
            
            localStorage.setItem('currentUser', JSON.stringify({
                uid: newUID,
                username: username,
                balance: 0,
                commissionRate: 5,
                vipLevel: 1,
                inviteCode: newInviteCode,
                isLoggedIn: true,
                loginTime: Date.now()
            }));
            
            showMessage('Registration successful! Redirecting...', false);
            setTimeout(()=>{ window.location.href='dashboard.html'; },1500);
        }
        
        if(localStorage.getItem('currentUser')){ try{ if(JSON.parse(localStorage.getItem('currentUser')).isLoggedIn) window.location.href='dashboard.html'; }catch(e){} }
    </script>
</body>
</html>
