<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Register</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .register-container { width: 100%; padding: 20px; position: relative; z-index: 1; }
        .register-card {
            background: rgba(20, 30, 55, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 42px 40px;
            max-width: 480px;
            margin: 0 auto;
            border: 1px solid rgba(201, 176, 149, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .logo { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 8px; color: #ffffff; }
        .logo span { color: #C9B095; }
        .subtitle { text-align: center; color: #a0a8c0; margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #a0a8c0; font-size: 13px; }
        .form-group label i { margin-right: 8px; color: #C9B095; }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #C9B095; box-shadow: 0 0 0 3px rgba(201,176,149,0.15); }
        .register-btn {
            width: 100%;
            background: rgba(201, 176, 149, 0.15);
            border: 1px solid rgba(201, 176, 149, 0.3);
            padding: 14px;
            border-radius: 40px;
            color: #C9B095;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            transition: 0.2s;
        }
        .register-btn:hover { transform: scale(1.02); background: rgba(201,176,149,0.25); color: #ffd700; }
        .login-link { text-align: center; margin-top: 24px; font-size: 13px; color: #a0a8c0; }
        .login-link a { color: #C9B095; text-decoration: none; }
        .error-message { text-align: center; margin-top: 16px; font-size: 13px; min-height: 40px; }
        .success-message { text-align: center; margin-top: 16px; font-size: 13px; color: #4ade80; }
        
        /* 波浪背景容器 */
        .waves-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        body {
            position: relative;
            overflow-x: hidden;
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #050814);
        }
    </style>
</head>
<body>
    <!-- 波浪背景 Canvas -->
    <canvas id="wavesBg" class="waves-bg"></canvas>

    <div class="register-container">
        <div class="register-card">
            <div class="logo">ADDITIVE<span>®</span></div>
            <div class="subtitle">Create your account</div>
            <div class="form-group"><label><i class="fas fa-phone"></i> Phone Number</label><input type="tel" id="regPhone" placeholder="Enter your phone number"></div>
            <div class="form-group"><label><i class="fas fa-user"></i> Username</label><input type="text" id="regUsername" placeholder="Username (min 3 chars)"></div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="regPassword" placeholder="Password (min 4 chars)"></div>
            <div class="form-group"><label><i class="fas fa-qrcode"></i> Invitation Code (optional)</label><input type="text" id="regInviteCode" placeholder="Enter invite code"></div>
            <div class="form-group"><label><i class="fas fa-wallet"></i> Withdrawal PIN (4 digits)</label><input type="password" id="regPin" maxlength="4" placeholder="4-digit PIN"></div>
            <button class="register-btn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div class="login-link">Already have an account? <a href="signin.html">Sign in</a></div>
            <div id="registerError" class="error-message"></div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 生成6位随机邀请码 (大写字母+数字)
        function generateInviteCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        function showMessage(msg, isError = true) {
            const d = document.getElementById('registerError');
            d.innerText = msg;
            d.className = isError ? 'error-message' : 'success-message';
            setTimeout(() => { if (d.innerText === msg) d.innerText = ''; }, 4000);
        }
        
        async function handleRegister() {
            const phone = document.getElementById('regPhone').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('regInviteCode').value.trim();
            const pin = document.getElementById('regPin').value;
            
            // 验证输入
            if (!phone) { showMessage('Please enter phone number'); return; }
            if (!username || username.length < 3) { showMessage('Username must be at least 3 characters'); return; }
            if (!password || password.length < 4) { showMessage('Password must be at least 4 characters'); return; }
            if (!pin || pin.length !== 4 || isNaN(pin)) { showMessage('Withdrawal PIN must be 4 digits'); return; }
            
            showMessage('Checking...', false);
            
            try {
                // 检查用户名是否已存在
                const { data: existingUser, error: checkError } = await sb
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();
                
                if (existingUser) { 
                    showMessage('Username already exists'); 
                    return; 
                }
                
                // 获取最大 UID
                const { data: maxUidData, error: uidError } = await sb
                    .from('users')
                    .select('uid')
                    .order('uid', { ascending: false })
                    .limit(1);
                
                let newUid = '100001';
                if (maxUidData && maxUidData.length > 0 && maxUidData[0].uid) {
                    newUid = (parseInt(maxUidData[0].uid) + 1).toString();
                }
                
                // 处理邀请码 - 查找邀请人
                let invitedBy = '';
                let invitedByUsername = '';
                
                if (inviteCode) {
                    const { data: inviter, error: inviterError } = await sb
                        .from('users')
                        .select('uid, username, balance')
                        .eq('invite_code', inviteCode)
                        .maybeSingle();
                    
                    if (inviter) {
                        invitedBy = inviter.uid;
                        invitedByUsername = inviter.username;
                        
                        // 给邀请人奖励 €10
                        const newBalance = (inviter.balance || 0) + 10;
                        const { error: updateError } = await sb
                            .from('users')
                            .update({ balance: newBalance })
                            .eq('uid', inviter.uid);
                        
                        if (!updateError) {
                            // 记录奖励充值
                            await sb
                                .from('deposits')
                                .insert([{ 
                                    uid: inviter.uid, 
                                    username: inviter.username, 
                                    amount: 10, 
                                    type: 'referral_bonus',
                                    created_at: new Date().toISOString()
                                }]);
                            showMessage('Invitation code accepted! +€10 for referrer', false);
                        }
                    } else {
                        showMessage('Invitation code not found, continuing without it', false);
                    }
                }
                
                // 生成新用户的邀请码
                const newInviteCode = generateInviteCode();
                
                // 创建新用户
                const { data: newUser, error: insertError } = await sb
                    .from('users')
                    .insert([{
                        uid: newUid,
                        phone: phone,
                        username: username,
                        password: password,
                        pin: pin,
                        balance: 0,
                        trial_bonus_amount: 0,
                        vip_level: 1,
                        invite_code: newInviteCode,
                        invited_by: invitedBy,
                        invited_by_username: invitedByUsername,
                        total_orders: 0,
                        is_active: true,
                        created_at: new Date().toISOString()
                    }])
                    .select()
                    .single();
                
                if (insertError) {
                    console.error('Insert error:', insertError);
                    showMessage('Registration failed: ' + insertError.message);
                    return;
                }
                
                // 保存登录状态到 localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: newUid,
                    username: username,
                    balance: 0,
                    trialBonusAmount: 0,
                    commissionRate: 0.51,
                    vipLevel: 1,
                    inviteCode: newInviteCode,
                    isLoggedIn: true,
                    loginTime: Date.now()
                }));
                
                showMessage('Registration successful! Redirecting...', false);
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                
            } catch (err) {
                console.error('Registration error:', err);
                showMessage('Error: ' + err.message);
            }
        }
        
        // 检查是否已登录
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user.isLoggedIn) window.location.href = 'dashboard.html';
            } catch(e) {}
        }
        
        // 回车提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleRegister();
        });
    </script>

    <!-- 波浪效果脚本 -->
    <script>
    (function() {
        const canvas = document.getElementById('wavesBg');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height;
        let time = 0;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function animate() {
            time += 0.02;
            ctx.fillStyle = '#0a0f2a';
            ctx.fillRect(0, 0, width, height);
            
            for(let i = 0; i < 3; i++) {
                ctx.beginPath();
                for(let x = 0; x <= width; x += 10) {
                    const y = height * (0.4 + i * 0.2) + Math.sin(x * 0.01 + time * (1 + i * 0.5)) * 30 + Math.cos(x * 0.02 + time) * 15;
                    if(x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `rgba(201, 176, 149, ${0.15 - i * 0.03})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
