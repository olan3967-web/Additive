<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Orders History - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
    <script src="notification.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d5 100%); font-family: 'Inter', sans-serif; color: #1f2937; display: flex; justify-content: center; }
        .phone { width: 390px; min-height: 100vh; background: transparent; padding-bottom: 80px; position: relative; }
        
        /* 头部 */
        .page-header { padding: 20px 16px 10px; display: flex; align-items: center; gap: 16px; }
        .page-header h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; flex: 1; }
        .back-btn { background: none; border: none; font-size: 24px; color: #ff7a00; cursor: pointer; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .back-btn:hover { background: rgba(0,0,0,0.05); }
        
        /* 订单列表 */
        .orders-list { margin: 0 16px; }
        .order-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 12px; border: 1px solid #eef2f7; cursor: pointer; transition: all 0.25s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-color: #ff7a00; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .order-no { font-size: 13px; font-weight: 700; color: #ff7a00; font-family: monospace; background: rgba(255,122,0,0.1); padding: 4px 10px; border-radius: 20px; }
        .order-date { font-size: 10px; color: #94a3b8; }
        .order-products { font-size: 13px; color: #4b5563; margin-bottom: 12px; line-height: 1.4; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #f0e8e0; }
        .order-total { font-size: 16px; font-weight: 800; color: #ff7a00; }
        .order-commission { font-size: 12px; font-weight: 600; color: #10b981; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 600; background: #dcfce7; color: #10b981; display: inline-flex; align-items: center; gap: 4px; }
        
        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state i { font-size: 48px; color: #cbd5e1; margin-bottom: 12px; display: block; }
        
        /* 弹窗 */
        .order-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: all 0.3s; }
        .order-modal.active { visibility: visible; opacity: 1; }
        .order-modal-content { background: white; border-radius: 28px; width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto; padding: 24px; }
        .order-modal-content h3 { margin-bottom: 16px; color: #1a1a2e; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .order-modal-content h3 i { color: #ff7a00; }
        
        /* 产品列表 */
        .product-list { margin-bottom: 20px; max-height: 200px; overflow-y: auto; }
        .product-item-modal { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eef2f7; }
        .product-item-modal:last-child { border-bottom: none; }
        .product-item-modal img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #f0f2f5; }
        
        /* 物流时间线 */
        .timeline-container { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .timeline-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid #eef2f7; }
        .timeline-title i { color: #ff7a00; }
        .timeline-item { display: flex; gap: 12px; padding: 12px 0; align-items: flex-start; border-bottom: 1px solid #f0f0f0; }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #10b981; color: white; font-size: 12px; flex-shrink: 0; }
        .timeline-status { font-size: 13px; font-weight: 500; color: #1f2937; flex: 1; }
        .timeline-time { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        
        /* 加载状态 */
        .loading-container { display: flex; justify-content: center; align-items: center; min-height: 300px; }
        .loading-spinner { text-align: center; }
        .loading-spinner i { font-size: 40px; color: #ff7a00; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 底部导航 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-top: 1px solid #eef2f7; display: flex; padding: 10px 0 14px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; font-weight: 500; color: #9ca3af; cursor: pointer; position: relative; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: #ff7a00; font-weight: 700; }
        
        /* 分割线 */
        .divider { height: 1px; background: linear-gradient(90deg, transparent, #e2e8f0, transparent); margin: 16px 0; }
    </style>
</head>
<body>
<div class="phone">
    <div class="page-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Orders History</h1>
        <div style="width: 30px;"></div>
    </div>
    
    <div id="completedOrdersList" class="orders-list">
        <div class="loading-container"><div class="loading-spinner"><i class="fas fa-spinner"></i><div style="margin-top: 10px; font-size: 12px;">Loading...</div></div></div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item active" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>
</div>

<!-- 订单详情弹窗 -->
<div id="orderModal" class="order-modal">
    <div class="order-modal-content">
        <h3><i class="fas fa-box-open"></i> <span id="modalOrderNo">订单详情</span></h3>
        <div class="divider"></div>
        <div id="modalProductsList" class="product-list"></div>
        <div class="divider"></div>
        <div id="modalTimeline" class="timeline-container"></div>
    </div>
</div>

<script>
// 固定的13个物流状态（用于当 timeline 为空时的默认显示）
const ALL_STATUSES = [
    "Order is placed",
    "Payment received from buyer",
    "Payment under escrow protection",
    "Payment released",
    "Order confirmed",
    "Preparing parcel for shipment",
    "Courier assigned",
    "Parcel picked up by logistics partner",
    "Parcel arrived at sorting facility",
    "Parcel departed from sorting facility",
    "Parcel arrived at delivery hub",
    "Parcel out for delivery",
    "Parcel delivered"
];

function formatDate(dateStr) {
    if (!dateStr) return '—';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return '—';
    return date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) { 
    if (!str) return ''; 
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); 
}

function goBack() { 
    window.location.href = 'dashboard.html'; 
}

let completedOrders = [];

async function loadCompletedOrders() {
    const user = getCurrentUser();
    if (!user) { 
        window.location.href = 'signin.html'; 
        return; 
    }

    const container = document.getElementById('completedOrdersList');
    container.innerHTML = '<div class="loading-container"><div class="loading-spinner"><i class="fas fa-spinner"></i><div style="margin-top: 10px;">Loading orders...</div></div></div>';

    const { data: orders, error } = await sb
        .from('user_orders')
        .select('*')
        .eq('uid', user.uid)
        .eq('status', 'delivered')
        .order('completed_at', { ascending: false });

    if (error) { 
        console.error('加载订单失败:', error); 
        container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-circle-xmark"></i>Failed to load orders</div>'; 
        return; 
    }

    completedOrders = orders || [];
    renderOrders();
}

function renderOrders() {
    const container = document.getElementById('completedOrdersList');
    if (!container) return;

    if (completedOrders.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-inbox"></i>No completed orders yet<div style="margin-top: 8px; font-size: 12px;">Complete orders to see them here</div></div>';
        return;
    }

    container.innerHTML = completedOrders.map(order => {
        let productsText = '';
        try {
            const products = JSON.parse(order.products || '[]');
            productsText = products.map(p => `${p.product_name} ×${p.quantity}`).join(', ');
        } catch(e) { 
            productsText = order.products || '-'; 
        }
        
        return `
            <div class="order-card" data-order='${JSON.stringify(order)}'>
                <div class="order-header">
                    <span class="order-no">${escapeHtml(order.order_no)}</span>
                    <span class="order-date"><i class="far fa-calendar-alt"></i> ${formatDate(order.completed_at || order.created_at)}</span>
                </div>
                <div class="order-products">${escapeHtml(productsText.substring(0, 80))}${productsText.length > 80 ? '...' : ''}</div>
                <div class="order-footer">
                    <span class="order-total">€${(order.total_supply_price || 0).toFixed(2)}</span>
                    <span class="order-commission">+€${(order.total_commission || 0).toFixed(2)}</span>
                    <span class="status-badge"><i class="fas fa-check-circle"></i> Delivered</span>
                </div>
            </div>
        `;
    }).join('');

    document.querySelectorAll('.order-card').forEach(card => {
        card.addEventListener('click', () => {
            const order = JSON.parse(card.dataset.order);
            openOrderDetail(order);
        });
    });
}

function openOrderDetail(order) {
    // 设置标题
    document.getElementById('modalOrderNo').innerHTML = `${escapeHtml(order.order_no)}`;
    
    // 产品列表
    let productsHtml = '';
    try {
        const products = JSON.parse(order.products || '[]');
        if (products.length > 0) {
            products.forEach(p => {
                productsHtml += `<div class="product-item-modal">
                    <img src="${p.image_url || 'https://placehold.co/50x50/f0f2f5/94a3b8?text=Product'}" onerror="this.src='https://placehold.co/50x50/f0f2f5/94a3b8?text=Product'">
                    <div style="flex:1;">
                        <div style="font-weight:600;">${escapeHtml(p.product_name)}</div>
                        <div style="font-size:11px; color:#6b7280;">Quantity: ${p.quantity} | €${p.unit_price.toFixed(2)} each</div>
                    </div>
                    <div style="font-weight:700; color:#ff7a00;">€${(p.unit_price * p.quantity).toFixed(2)}</div>
                </div>`;
            });
        } else {
            productsHtml = '<div style="text-align:center; padding:20px; color:#94a3b8;">No product details</div>';
        }
    } catch(e) { 
        productsHtml = '<div style="text-align:center; padding:20px; color:#94a3b8;">Failed to load products</div>'; 
    }
    document.getElementById('modalProductsList').innerHTML = productsHtml;
    
    // 物流时间线
    let timeline = [];
    if (order.tracking_timeline) {
        try {
            if (typeof order.tracking_timeline === 'string') {
                timeline = JSON.parse(order.tracking_timeline);
            } else {
                timeline = order.tracking_timeline;
            }
        } catch(e) {
            console.error('解析失败:', e);
        }
    }
    
    // 如果 timeline 为空，使用默认的 ALL_STATUSES
    if (!timeline || timeline.length === 0) {
        timeline = ALL_STATUSES.map(status => ({ status: status, time: order.completed_at || order.created_at || new Date().toISOString() }));
    }
    
    let timelineHtml = `
        <div class="timeline-title">
            <i class="fas fa-road"></i> Tracking Timeline
        </div>
    `;
    
    timeline.forEach(item => {
        timelineHtml += `
            <div class="timeline-item">
                <div class="timeline-icon"><i class="fas fa-check"></i></div>
                <div>
                    <div class="timeline-status">${escapeHtml(item.status)}</div>
                    <div class="timeline-time">${formatDate(item.time)}</div>
                </div>
            </div>
        `;
    });
    
    document.getElementById('modalTimeline').innerHTML = timelineHtml;
    document.getElementById('orderModal').classList.add('active');
}

// 点击弹窗外关闭
document.getElementById('orderModal')?.addEventListener('click', (e) => {
    if (e.target === document.getElementById('orderModal')) {
        document.getElementById('orderModal').classList.remove('active');
    }
});

function setupBottomNav() {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'dashboard') window.location.href = 'start.html';
            else if (page === 'products') window.location.href = 'products.html';
            else if (page === 'orders') window.location.href = 'orders.html';
            else if (page === 'profile') window.location.href = 'dashboard.html';
        });
    });
}

setupBottomNav();
loadCompletedOrders();
</script>
</body>
</html>
