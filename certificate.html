<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Certificate - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding-bottom: 80px;
            position: relative;
        }

        .page-header {
            padding: 20px 16px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #ff7a00;
            cursor: pointer;
        }

        .certificate-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .certificate-frame {
            background: #fef9ef;
            padding: 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8dcc8;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .certificate-frame::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid #d4af37;
            pointer-events: none;
        }

        .certificate-inner {
            background: #fffdf8;
            padding: 4px;
        }

        .certificate-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 48px;
            color: #cbd5e1;
            margin-bottom: 12px;
            display: block;
        }

        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner i {
            font-size: 40px;
            color: #ff7a00;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .zoom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .zoom-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .zoom-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .zoom-image {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .zoom-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .zoom-close:hover {
            opacity: 1;
        }

        .certificates-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            cursor: pointer;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="phone">

    <div class="page-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Certificate</h1>
        <div style="width: 30px;"></div>
    </div>

    <div class="certificate-container" id="certificateContainer">
        <div class="loading-container">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <div style="margin-top: 10px;">Loading...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item active" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>

</div>

<div id="zoomModal" class="zoom-modal">
    <div class="zoom-content">
        <button class="zoom-close" id="zoomCloseBtn">&times;</button>
        <img id="zoomImage" class="zoom-image" src="" alt="Certificate">
    </div>
</div>

<script>
    function getCurrentUser() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) return null;
        try { return JSON.parse(userStr); } catch(e) { return null; }
    }

    async function loadCertificates() {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'signin.html';
            return;
        }

        const container = document.getElementById('certificateContainer');
        container.innerHTML = `<div class="loading-container"><div class="loading-spinner"><i class="fas fa-spinner"></i><div>Loading...</div></div></div>`;

        try {
            const { data: certificates, error } = await sb
                .from('certificates')
                .select('image_url, created_at')
                .eq('is_active', true)
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!certificates || certificates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-certificate"></i>
                        No certificate yet
                        <div style="margin-top: 12px; font-size: 12px;">Complete 100 orders to earn your certificate</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="certificates-list">
                    ${certificates.map((cert, index) => `
                        <div class="certificate-frame" data-index="${index}" data-url="${cert.image_url}">
                            <div class="certificate-inner">
                                <img class="certificate-image" src="${cert.image_url}" alt="Certificate" onerror="this.src='https://placehold.co/900x1288/f0f2f5/94a3b8?text=Certificate+Not+Found'">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.querySelectorAll('.certificate-frame').forEach(frame => {
                frame.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const imageUrl = frame.dataset.url;
                    if (imageUrl) {
                        openZoomImage(imageUrl);
                    }
                });
            });

        } catch (e) {
            console.error('加载证书失败:', e);
            container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-circle-xmark"></i>Failed to load certificate</div>';
        }
    }

    function openZoomImage(imageUrl) {
        const modal = document.getElementById('zoomModal');
        const zoomImage = document.getElementById('zoomImage');
        zoomImage.src = imageUrl;
        modal.classList.add('active');
    }

    function closeZoomImage() {
        const modal = document.getElementById('zoomModal');
        modal.classList.remove('active');
    }

    function goBack() {
        window.location.href = 'dashboard.html';
    }

    function setupBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page === 'dashboard') window.location.href = 'start.html';
                else if (page === 'products') window.location.href = 'products.html';
                else if (page === 'orders') window.location.href = 'orders-history.html';
                else if (page === 'profile') window.location.href = 'dashboard.html';
            });
        });
    }

    document.getElementById('zoomCloseBtn')?.addEventListener('click', closeZoomImage);
    document.getElementById('zoomModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('zoomModal')) {
            closeZoomImage();
        }
    });

    setupBottomNav();
    loadCertificates();
</script>
</body>
</html>
