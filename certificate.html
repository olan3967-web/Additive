<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Certificate - ADDITIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: #f5f7fb;
            padding-bottom: 80px;
            position: relative;
        }

        .page-header {
            padding: 20px 16px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #ff7a00;
            cursor: pointer;
        }

        /* Certificate 卡片容器 */
        .certificate-container {
            padding: 0 16px;
            display: flex;
            justify-content: center;
        }

        .certificate-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 100%;
        }

        /* Certificate 图片 - 900x1288 比例 */
        .certificate-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 加载状态 */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner i {
            font-size: 40px;
            color: #ff7a00;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 48px;
            color: #cbd5e1;
            margin-bottom: 12px;
            display: block;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid #eef2f7;
            display: flex;
            padding: 10px 0 14px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            cursor: pointer;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ff7a00;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="phone">

    <div class="page-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Certificate</h1>
        <div style="width: 30px;"></div>
    </div>

    <div class="certificate-container" id="certificateContainer">
        <div class="loading-container">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <div style="margin-top: 10px;">Loading certificate...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="products"><i class="fa-solid fa-box"></i><span>Products</span></div>
        <div class="nav-item" data-page="orders"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
        <div class="nav-item active" data-page="profile"><i class="fa-solid fa-user"></i><span>My Profile</span></div>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://ygeawapbjcfytjoxpttk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3X4gUSBt2i7OXB1IsajBiQ__NM-OIGn';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getCurrentUser() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) return null;
        try { return JSON.parse(userStr); } catch(e) { return null; }
    }

    async function loadCertificate() {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'signin.html';
            return;
        }

        const container = document.getElementById('certificateContainer');
        container.innerHTML = `<div class="loading-container"><div class="loading-spinner"><i class="fas fa-spinner"></i><div>Loading...</div></div></div>`;

        try {
            const { data, error } = await sb
                .from('certificates')
                .select('image_url')
                .eq('uid', user.uid)
                .eq('is_active', true)
                .order('created_at', { ascending: false })
                .limit(1)
                .single();

            if (error || !data || !data.image_url) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-certificate"></i>
                        No certificate yet
                        <div style="margin-top: 12px; font-size: 12px;">Complete 100 orders to earn your certificate</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="certificate-card">
                    <img class="certificate-image" src="${data.image_url}" alt="Certificate" onerror="this.src='https://placehold.co/900x1288/f0f2f5/94a3b8?text=Certificate+Not+Found'">
                </div>
            `;
        } catch (e) {
            console.error('加载证书失败:', e);
            container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-circle-xmark"></i>Failed to load certificate</div>';
        }
    }

    function goBack() {
        window.location.href = 'dashboard.html';
    }

    function setupBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page === 'dashboard') window.location.href = 'start.html';
                else if (page === 'products') window.location.href = 'products.html';
                else if (page === 'orders') window.location.href = 'history.html';
                else if (page === 'profile') window.location.href = 'dashboard.html';
            });
        });
    }

    setupBottomNav();
    loadCertificate();
</script>
</body>
</html>
